name: CI

on:
  merge_group:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  # 7 GiB by default on GitHub, setting to 6 GiB
  # https://docs.github.com/en/actions/concepts/runners/github-hosted-runners
  NODE_OPTIONS: --max-old-space-size=6144

# Remove default permissions of GITHUB_TOKEN for security
# https://docs.github.com/en/actions/tutorials/authenticate-with-github_token
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.sha }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

jobs:
  changes:
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/v')
    runs-on: namespace-profile-rari-linux-amd64
    permissions:
      contents: read
      pull-requests: read
    outputs:
      src: ${{ steps.filter.outputs.src }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            src:
              - 'packages/**'
              - 'test/**'
              - 'examples/**'
              - 'web/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - 'vite.config.ts'
              - 'playwright.config.ts'
              - 'eslint.config.js'
              - '.github/workflows/ci.yml'
            rust:
              - '.github/workflows/ci.yml'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - '.clippy.toml'
              - '.rustfmt.toml'

  build-snapshot:
    name: Build V8 snapshot
    needs: changes
    if: |
      needs.changes.outputs.rust == 'true' ||
      (needs.changes.outputs.src == 'true' && (github.event_name != 'push' || github.ref_name != 'main'))
    runs-on: namespace-profile-rari-linux-amd64
    timeout-minutes: 30
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: nightly

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libfontconfig1-dev

      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: snapshot

      - name: Create snapshot placeholder
        run: |
          mkdir -p crates/rari/snapshots
          touch crates/rari/snapshots/RARI_SNAPSHOT.bin
          echo 'pub static RESIDUAL_LAZY_ESM_SOURCES: &[(&str, &str)] = &[];' > crates/rari/snapshots/residual_lazy_sources.rs
          echo 'pub static RESIDUAL_LAZY_JS_SOURCES: &[(&str, &str)] = &[];' >> crates/rari/snapshots/residual_lazy_sources.rs

      - name: Generate V8 snapshot
        run: cargo run --manifest-path tools/snapshot/Cargo.toml -- crates/rari/snapshots

      - name: Upload snapshot
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: v8-snapshot
          path: |
            crates/rari/snapshots/RARI_SNAPSHOT.bin
            crates/rari/snapshots/residual_lazy_sources.rs
          if-no-files-found: error
          retention-days: 1

      - name: Cancel workflow on failure
        if: failure() && github.event_name == 'merge_group'
        run: gh run cancel ${{ github.run_id }} --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}

  rust-check:
    needs: [changes, build-snapshot]
    if: needs.changes.outputs.rust == 'true'
    runs-on: namespace-profile-rari-linux-amd64
    timeout-minutes: 15
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: nightly
          components: rustfmt, clippy

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libfontconfig1-dev

      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: rust-check

      - name: Download snapshot
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: v8-snapshot
          path: crates/rari/snapshots

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test Rust
        run: cargo test --all-features

      - name: Cancel workflow on failure
        if: failure() && github.event_name == 'merge_group'
        run: gh run cancel ${{ github.run_id }} --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}

  build-rari-binary:
    name: Build rari binary (${{ matrix.os }})
    needs: [changes, build-snapshot]
    if: (needs.changes.outputs.rust == 'true' || needs.changes.outputs.src == 'true') && (github.event_name != 'push' || github.ref_name != 'main')
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [namespace-profile-rari-linux-amd64, windows-latest]
        exclude:
          - os: ${{ github.event_name == 'merge_group' && 'windows-latest' || '' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: nightly

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libfontconfig1-dev

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install fontconfig:x64-windows
        shell: pwsh

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*

      - name: Install @napi-rs/cli
        run: npm install -g @napi-rs/cli

      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "e2e-${{ runner.os }}"

      - name: Download snapshot
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: v8-snapshot
          path: crates/rari/snapshots

      - name: Build rari binary (Windows)
        if: runner.os == 'Windows'
        run: |
          cargo build --bin rari
          # napi-rs 'use cache' transform addon — required at runtime by packages/rari
          # (see packages/rari/src/vite/use-cache-transform.ts).
          # `napi build` produces index.node; rename to use_cache_transform.node to match the JS-side lookup.
          napi.cmd build --target x86_64-pc-windows-msvc -p use-cache-transform --output-dir target/x86_64-pc-windows-msvc/debug
          mv target/x86_64-pc-windows-msvc/debug/index.node target/x86_64-pc-windows-msvc/debug/use_cache_transform.node
        env:
          AWS_LC_SYS_PREBUILT_NASM: 1
          PKG_CONFIG_PATH: C:\vcpkg\installed\x64-windows\lib\pkgconfig
          VCPKG_ROOT: C:\vcpkg

      - name: Build rari binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cargo build --bin rari
          # napi-rs 'use cache' transform addon — required at runtime by packages/rari
          # (see packages/rari/src/vite/use-cache-transform.ts)
          napi build --target x86_64-unknown-linux-gnu -p use-cache-transform --output-dir target/x86_64-unknown-linux-gnu/debug
          mv target/x86_64-unknown-linux-gnu/debug/index.node target/x86_64-unknown-linux-gnu/debug/use_cache_transform.node

      - name: Verify napi addon built
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            TRIPLE="x86_64-pc-windows-msvc"
          else
            TRIPLE="x86_64-unknown-linux-gnu"
          fi
          ADDON="target/${TRIPLE}/debug/use_cache_transform.node"
          if [ ! -f "$ADDON" ]; then
            echo "::error::Expected napi addon at $ADDON but it was not produced"
            exit 1
          fi
          echo "napi addon present: $ADDON ($(du -h "$ADDON" | cut -f1))"

      - name: Upload binary (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rari-binary-linux
          path: |
            target/debug/rari
            target/x86_64-unknown-linux-gnu/debug/use_cache_transform.node
          if-no-files-found: error
          retention-days: 1

      - name: Upload binary (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rari-binary-windows
          path: |
            target/debug/rari.exe
            target/x86_64-pc-windows-msvc/debug/use_cache_transform.node
          if-no-files-found: error
          retention-days: 1

      - name: Cancel workflow on failure
        if: failure() && github.event_name == 'merge_group'
        run: gh run cancel ${{ github.run_id }} --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}

  build:
    needs: changes
    if: needs.changes.outputs.src == 'true' || needs.changes.outputs.rust == 'true'
    runs-on: namespace-profile-rari-linux-amd64
    timeout-minutes: 10
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: |
          pnpm --filter=@rari/logger run build
          pnpm --filter=@rari/deploy run build
          pnpm --filter=rari run build
          pnpm --filter=create-rari-app run build

      - name: Typecheck packages
        run: |
          pnpm --filter=rari run typecheck
          pnpm --filter=create-rari-app run typecheck

      - name: Verify dist outputs
        run: |
          test -d packages/logger/dist
          test -d packages/deploy/dist
          test -d packages/rari/dist
          test -d packages/create-rari-app/dist

      - name: Cache dist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          if-no-files-found: error
          retention-days: 3
          name: dist
          path: |
            packages/logger/dist
            packages/deploy/dist
            packages/rari/dist
            packages/create-rari-app/dist

      - name: Cancel workflow on failure
        if: failure() && github.event_name == 'merge_group'
        run: gh run cancel ${{ github.run_id }} --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}

  lint-and-test:
    needs: changes
    if: needs.changes.outputs.src == 'true' || needs.changes.outputs.rust == 'true'
    runs-on: namespace-profile-rari-linux-amd64
    timeout-minutes: 15
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: |
          pnpm --filter=@rari/logger run build
          pnpm --filter=@rari/deploy run build
          pnpm --filter=rari run build
          pnpm --filter=create-rari-app run build

      - name: Lint
        run: pnpm lint

      - name: Test (unit)
        run: pnpm test:unit:run

      - name: Cancel workflow on failure
        if: failure() && github.event_name == 'merge_group'
        run: gh run cancel ${{ github.run_id }} --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}

  test-e2e:
    if: (needs.changes.outputs.src == 'true' || needs.changes.outputs.rust == 'true') && (github.event_name != 'push' || github.ref_name != 'main')
    runs-on: ${{ matrix.os }}
    permissions:
      actions: write
      contents: read
    needs:
      - changes
      - build
      - build-rari-binary
    strategy:
      fail-fast: ${{ github.event_name == 'merge_group' }}
      matrix:
        os: [namespace-profile-rari-linux-amd64, windows-latest]
        node: ['lts/*']
        exclude:
          - os: ${{ github.event_name == 'merge_group' && 'windows-latest' || '' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Restore dist cache
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: packages

      - name: Download rari binary (Linux)
        if: runner.os == 'Linux'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rari-binary-linux
          path: packages/rari-linux-x64/bin

      - name: Download rari binary (Windows)
        if: runner.os == 'Windows'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rari-binary-windows
          path: packages/rari-win32-x64/bin

      - name: Make binaries executable (Linux)
        if: runner.os == 'Linux'
        run: |
          chmod +x packages/rari-linux-x64/bin/rari
          chmod +x packages/rari-linux-x64/bin/use_cache_transform.node

      - name: Verify rari and napi addon present (e2e)
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            BIN_DIR="packages/rari-win32-x64/bin"
          else
            BIN_DIR="packages/rari-linux-x64/bin"
          fi
          ls -la "$BIN_DIR"
          test -f "$BIN_DIR/rari" || test -f "$BIN_DIR/rari.exe" || { echo "::error::rari binary missing in $BIN_DIR"; exit 1; }
          test -f "$BIN_DIR/use_cache_transform.node" || { echo "::error::use_cache_transform.node missing in $BIN_DIR"; exit 1; }

      - name: Set up cache (Linux)
        if: runner.os == 'Linux'
        uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1.4.3
        with:
          cache: |
            playwright
            apt
            pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright
        run: pnpm playwright install chromium --with-deps

      - name: Test (e2e)
        run: pnpm test:e2e

      - name: Cancel workflow on failure
        if: failure() && github.event_name == 'merge_group'
        run: gh run cancel ${{ github.run_id }} --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}

  ci-ok:
    if: always()
    runs-on: namespace-profile-rari-linux-amd64
    needs:
      - changes
      - build-snapshot
      - rust-check
      - build
      - build-rari-binary
      - lint-and-test
      - test-e2e
    steps:
      - name: Check required jobs
        run: |
          # Fail if any needed job was not successful (skipped counts as success)
          results=(
            "${{ needs.changes.result }}"
            "${{ needs.build-snapshot.result }}"
            "${{ needs.rust-check.result }}"
            "${{ needs.build.result }}"
            "${{ needs.build-rari-binary.result }}"
            "${{ needs.lint-and-test.result }}"
            "${{ needs.test-e2e.result }}"
          )
          for result in "${results[@]}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "One or more required jobs failed or were cancelled: $result"
              exit 1
            fi
          done
          echo "All required jobs passed or were skipped."