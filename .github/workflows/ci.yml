name: CI

on:
  merge_group:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  # 7 GiB by default on GitHub, setting to 6 GiB
  # https://docs.github.com/en/actions/concepts/runners/github-hosted-runners
  NODE_OPTIONS: --max-old-space-size=6144

# Remove default permissions of GITHUB_TOKEN for security
# https://docs.github.com/en/actions/tutorials/authenticate-with-github_token
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.sha }}-v2
  cancel-in-progress: ${{ github.event_name != 'push' }}

jobs:
  changes:
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/v')
    runs-on: namespace-profile-rari-linux-amd64
    permissions:
      contents: read
      pull-requests: read
    outputs:
      src: ${{ steps.filter.outputs.src }}
      rust: ${{ steps.filter.outputs.rust }}
      snapshot: ${{ steps.filter.outputs.snapshot }}
      use_cache_crate: ${{ steps.filter.outputs.use_cache_crate }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            src:
              - 'packages/**'
              - 'test/**'
              - 'examples/**'
              - 'web/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - 'vite.config.ts'
              - 'playwright.config.ts'
              - 'eslint.config.js'
              - '.github/workflows/ci.yml'
            rust:
              - '.github/workflows/ci.yml'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - '.clippy.toml'
              - '.rustfmt.toml'
              - 'tools/bundle-react-esm/**'
              - 'pnpm-lock.yaml'
            snapshot:
              - 'crates/rari/src/runtime/ext/**'
              - 'tools/snapshot/**'
              - 'tools/bundle-react-esm/**'
              - 'pnpm-lock.yaml'
            use_cache_crate:
              - '.github/workflows/ci.yml'
              - 'crates/rari_use_cache/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'

  build-snapshot:
    name: Build V8 snapshot
    needs: changes
    if: needs.changes.outputs.snapshot == 'true'
    runs-on: namespace-profile-rari-linux-amd64
    timeout-minutes: 30
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: nightly

      - uses: ./.github/actions/setup-rust-build-deps

      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: rust-linux

      - name: Bundle React ESM vendor files
        uses: ./.github/actions/bundle-react-esm

      - name: Restore snapshot from cache
        id: cache-snapshot
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: crates/rari/snapshots
          key: v8-snapshot-${{ hashFiles('crates/rari/src/runtime/ext/**', 'tools/snapshot/**', 'tools/bundle-react-esm/**', 'pnpm-lock.yaml') }}

      - name: Create snapshot placeholder
        if: steps.cache-snapshot.outputs.cache-hit != 'true'
        run: just ci-create-snapshot-placeholder

      - name: Generate V8 snapshot
        if: steps.cache-snapshot.outputs.cache-hit != 'true'
        run: just ci-generate-snapshot

      - name: Save snapshot to cache
        if: steps.cache-snapshot.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: crates/rari/snapshots
          key: v8-snapshot-${{ hashFiles('crates/rari/src/runtime/ext/**', 'tools/snapshot/**', 'tools/bundle-react-esm/**', 'pnpm-lock.yaml') }}

      - name: Upload snapshot
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: v8-snapshot
          path: |
            crates/rari/snapshots/RARI_SNAPSHOT.bin
            crates/rari/snapshots/residual_lazy_sources.rs
          if-no-files-found: error
          retention-days: 1

      - uses: ./.github/actions/cancel-merge-group-on-failure

  rust-check:
    needs: [changes, build-snapshot]
    if: |
      (always() && !cancelled()) &&
      needs.changes.outputs.rust == 'true'
    runs-on: namespace-profile-rari-linux-amd64
    timeout-minutes: 15
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: nightly
          components: rustfmt, clippy

      - uses: ./.github/actions/setup-rust-build-deps

      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: rust-linux

      - name: Bundle React ESM vendor files
        uses: ./.github/actions/bundle-react-esm

      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Restore snapshot from cache
        if: needs.build-snapshot.result != 'success'
        id: cache-snapshot
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: crates/rari/snapshots
          key: v8-snapshot-${{ hashFiles('crates/rari/src/runtime/ext/**', 'tools/snapshot/**', 'tools/bundle-react-esm/**', 'pnpm-lock.yaml') }}
          restore-keys: |
            v8-snapshot-

      - name: Download snapshot
        if: needs.build-snapshot.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: v8-snapshot
          path: crates/rari/snapshots

      - name: Generate snapshot if needed
        if: needs.build-snapshot.result != 'success' && steps.cache-snapshot.outputs.cache-hit != 'true'
        run: just ci-generate-snapshot

      - name: Rust check
        run: just ci-rust-check

      - uses: ./.github/actions/cancel-merge-group-on-failure

  build-rari-binary:
    name: Build rari binary (${{ matrix.os }})
    needs: [changes, build-snapshot]
    if: |
      (always() && !cancelled()) &&
      (needs.changes.outputs.rust == 'true' || needs.changes.outputs.src == 'true') &&
      (github.event_name != 'push' || github.ref_name != 'main')
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [namespace-profile-rari-linux-amd64, namespace-profile-rari-windows-amd64]
        exclude:
          - os: ${{ github.event_name == 'merge_group' && 'namespace-profile-rari-windows-amd64' || '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: nightly

      - uses: ./.github/actions/setup-rust-build-deps
        with:
          vcpkg-triplet: x64-windows

      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: rust-${{ runner.os }}

      - name: Bundle React ESM vendor files
        uses: ./.github/actions/bundle-react-esm

      - name: Restore binary from cache
        if: needs.changes.outputs.rust != 'true'
        id: cache-binary
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: target/debug/rari${{ runner.os == 'Windows' && '.exe' || '' }}
          key: rari-binary-${{ runner.os }}-${{ hashFiles('crates/**', 'Cargo.lock') }}
          restore-keys: |
            rari-binary-${{ runner.os }}-

      - name: Download snapshot
        if: needs.build-snapshot.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: v8-snapshot
          path: crates/rari/snapshots

      - name: Create snapshot placeholder
        if: needs.build-snapshot.result != 'success'
        run: just ci-create-snapshot-placeholder

      - name: Build rari binary (Windows)
        if: runner.os == 'Windows' && (needs.changes.outputs.rust == 'true' || steps.cache-binary.outputs.cache-hit != 'true')
        run: cargo build --bin rari
        env:
          AWS_LC_SYS_PREBUILT_NASM: 1
          PKG_CONFIG_PATH: C:\vcpkg\installed\x64-windows\lib\pkgconfig
          VCPKG_ROOT: C:\vcpkg

      - name: Build rari binary (Linux)
        if: runner.os != 'Windows' && (needs.changes.outputs.rust == 'true' || steps.cache-binary.outputs.cache-hit != 'true')
        run: cargo build --bin rari

      - name: Save binary to cache
        if: needs.changes.outputs.rust == 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: target/debug/rari${{ runner.os == 'Windows' && '.exe' || '' }}
          key: rari-binary-${{ runner.os }}-${{ hashFiles('crates/**', 'Cargo.lock') }}

      - name: Upload binary (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rari-binary-linux
          path: target/debug/rari
          if-no-files-found: error
          retention-days: 1

      - name: Upload binary (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rari-binary-windows
          path: target/debug/rari.exe
          if-no-files-found: error
          retention-days: 1

      - uses: ./.github/actions/cancel-merge-group-on-failure

  build-use-cache-addon:
    name: Build rari_use_cache.node (${{ matrix.os }})
    needs: [changes]
    if: needs.changes.outputs.use_cache_crate == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        exclude:
          - os: ${{ github.event_name == 'merge_group' && 'windows-latest' || '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: nightly

      - uses: ./.github/actions/setup-rust-build-deps
        with:
          fontconfig: 'false'

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Cache pnpm store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Cache Rust (use-cache crate only)
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: use-cache-${{ runner.os }}
          workspaces: crates/rari_use_cache

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Prepare use-cache platform package
        run: just ci-prepare-use-cache-addon

      - name: Upload addon (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: use-cache-linux-x64
          path: |
            packages/use-cache-linux-x64/rari_use_cache.node
            packages/use-cache-linux-x64/index.js
            packages/use-cache-linux-x64/package.json
          if-no-files-found: error
          retention-days: 1

      - name: Cache addon (Linux)
        if: runner.os == 'Linux'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: packages/use-cache-linux-x64
          key: use-cache-linux-x64-${{ hashFiles('crates/rari_use_cache/**', 'Cargo.lock') }}

      - name: Upload addon (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: use-cache-win32-x64
          path: |
            packages/use-cache-win32-x64/rari_use_cache.node
            packages/use-cache-win32-x64/index.js
            packages/use-cache-win32-x64/package.json
          if-no-files-found: error
          retention-days: 1

      - name: Cache addon (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: packages/use-cache-win32-x64
          key: use-cache-win32-x64-${{ hashFiles('crates/rari_use_cache/**', 'Cargo.lock') }}

  build:
    needs: [changes, build-use-cache-addon]
    if: |
      (always() && !cancelled()) &&
      (needs.changes.outputs.src == 'true' || needs.changes.outputs.rust == 'true')
    runs-on: namespace-profile-rari-linux-amd64
    timeout-minutes: 10
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-pnpm

      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - uses: ./.github/actions/restore-use-cache-addon
        with:
          platform: linux-x64

      - name: Build packages
        run: just ci-build-packages

      - name: Typecheck packages
        run: just ci-typecheck-packages

      - name: Verify dist outputs
        run: just ci-verify-dist

      - name: Upload dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          if-no-files-found: error
          retention-days: 3
          name: dist
          path: |
            packages/use-cache/dist/**
            packages/logger/dist/**
            packages/deploy/dist/**
            packages/rari/dist/**
            packages/create-rari-app/dist/**

      - uses: ./.github/actions/cancel-merge-group-on-failure

  lint-and-test:
    needs: [changes, build-use-cache-addon]
    if: |
      (always() && !cancelled()) &&
      (needs.changes.outputs.src == 'true' || needs.changes.outputs.rust == 'true')
    runs-on: namespace-profile-rari-linux-amd64
    timeout-minutes: 15
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-pnpm

      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - uses: ./.github/actions/restore-use-cache-addon
        with:
          platform: linux-x64

      - name: Lint and test
        run: just ci-lint-test

      - uses: ./.github/actions/cancel-merge-group-on-failure

  test-e2e:
    if: (needs.changes.outputs.src == 'true' || needs.changes.outputs.rust == 'true') && (github.event_name != 'push' || github.ref_name != 'main')
    runs-on: ${{ matrix.os }}
    permissions:
      actions: write
      contents: read
    needs:
      - changes
      - build
      - build-rari-binary
    strategy:
      fail-fast: ${{ github.event_name == 'merge_group' }}
      matrix:
        os: [namespace-profile-rari-linux-amd64, namespace-profile-rari-windows-amd64]
        node: ['lts/*']
        exclude:
          - os: ${{ github.event_name == 'merge_group' && 'namespace-profile-rari-windows-amd64' || '' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ matrix.node }}
          install: 'false'

      - name: Restore dist cache
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: packages

      - name: Download rari binary (Linux)
        if: runner.os == 'Linux'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rari-binary-linux
          path: packages/rari-linux-x64/bin

      - name: Download rari binary (Windows)
        if: runner.os == 'Windows'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rari-binary-windows
          path: packages/rari-win32-x64/bin

      - uses: ./.github/actions/restore-use-cache-addon
        if: runner.os == 'Linux'
        with:
          platform: linux-x64

      - uses: ./.github/actions/restore-use-cache-addon
        if: runner.os == 'Windows'
        with:
          platform: win32-x64

      - name: Make binary executable (Linux)
        if: runner.os == 'Linux'
        run: chmod +x packages/rari-linux-x64/bin/rari

      - name: Set up cache (Linux)
        if: runner.os == 'Linux'
        uses: namespacelabs/nscloud-cache-action@58bf6e08898e88803c098e2b522668541cd3b2e3 # v1.6.0
        with:
          cache: |
            playwright
            apt
            pnpm

      - name: Cache Playwright browsers (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~\AppData\Local\ms-playwright
          key: playwright-win-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: playwright-win-

      - uses: ./.github/actions/setup-redis

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright
        run: pnpm playwright install chromium --with-deps

      - name: Test (e2e)
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-${{ matrix.os }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

      - uses: ./.github/actions/cancel-merge-group-on-failure

  ci-ok:
    if: always()
    runs-on: namespace-profile-rari-linux-amd64
    needs:
      - changes
      - build-snapshot
      - rust-check
      - build
      - build-rari-binary
      - build-use-cache-addon
      - lint-and-test
      - test-e2e
    steps:
      - name: Check required jobs
        run: |
          results=(
            "${{ needs.changes.result }}"
            "${{ needs.build-snapshot.result }}"
            "${{ needs.rust-check.result }}"
            "${{ needs.build.result }}"
            "${{ needs.build-rari-binary.result }}"
            "${{ needs.build-use-cache-addon.result }}"
            "${{ needs.lint-and-test.result }}"
            "${{ needs.test-e2e.result }}"
          )

          for result in "${results[@]}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "One or more required jobs failed or were cancelled: $result"
              exit 1
            fi
          done

          echo "All required jobs passed or were skipped."
