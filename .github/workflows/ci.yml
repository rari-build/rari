name: CI

on:
  merge_group:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  # 7 GiB by default on GitHub, setting to 6 GiB
  # https://docs.github.com/en/actions/concepts/runners/github-hosted-runners
  NODE_OPTIONS: --max-old-space-size=6144

# Remove default permissions of GITHUB_TOKEN for security
# https://docs.github.com/en/actions/tutorials/authenticate-with-github_token
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.sha }}-v2
  cancel-in-progress: ${{ github.event_name != 'push' }}

jobs:
  changes:
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/v')
    runs-on: namespace-profile-rari-linux-amd64
    permissions:
      contents: read
      pull-requests: read
    outputs:
      src: ${{ steps.filter.outputs.src }}
      rust: ${{ steps.filter.outputs.rust }}
      use_cache_crate: ${{ steps.filter.outputs.use_cache_crate }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            src:
              - 'packages/**'
              - 'test/**'
              - 'examples/**'
              - 'web/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - 'vite.config.ts'
              - 'playwright.config.ts'
              - 'eslint.config.js'
              - '.github/workflows/ci.yml'
            rust:
              - '.github/workflows/ci.yml'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - '.clippy.toml'
              - '.rustfmt.toml'
            use_cache_crate:
              - '.github/workflows/ci.yml'
              - 'crates/rari-use-cache/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'

  build-snapshot:
    name: Build V8 snapshot
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: namespace-profile-rari-linux-amd64
    timeout-minutes: 30
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: nightly

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libfontconfig1-dev mold

      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: rust-linux

      - name: Create snapshot placeholder
        run: |
          mkdir -p crates/rari/snapshots
          touch crates/rari/snapshots/RARI_SNAPSHOT.bin
          echo 'pub static RESIDUAL_LAZY_ESM_SOURCES: &[(&str, &str)] = &[];' > crates/rari/snapshots/residual_lazy_sources.rs
          echo 'pub static RESIDUAL_LAZY_JS_SOURCES: &[(&str, &str)] = &[];' >> crates/rari/snapshots/residual_lazy_sources.rs

      - name: Generate V8 snapshot
        run: cargo run --manifest-path tools/snapshot/Cargo.toml -- crates/rari/snapshots
        env:
          RUSTFLAGS: -C link-arg=-fuse-ld=mold

      - name: Upload snapshot
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: v8-snapshot
          path: |
            crates/rari/snapshots/RARI_SNAPSHOT.bin
            crates/rari/snapshots/residual_lazy_sources.rs
          if-no-files-found: error
          retention-days: 1

      - name: Cancel workflow on failure
        if: failure() && github.event_name == 'merge_group'
        run: gh run cancel ${{ github.run_id }} --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}

  rust-check:
    needs: [changes, build-snapshot]
    if: needs.changes.outputs.rust == 'true'
    runs-on: namespace-profile-rari-linux-amd64
    timeout-minutes: 15
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: nightly
          components: rustfmt, clippy

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libfontconfig1-dev mold

      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: rust-linux

      - name: Download snapshot
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: v8-snapshot
          path: crates/rari/snapshots

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        env:
          RUSTFLAGS: -C link-arg=-fuse-ld=mold

      - name: Test Rust
        run: cargo test --all-features
        env:
          RUSTFLAGS: -C link-arg=-fuse-ld=mold

      - name: Cancel workflow on failure
        if: failure() && github.event_name == 'merge_group'
        run: gh run cancel ${{ github.run_id }} --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}

  build-rari-binary:
    name: Build rari binary (${{ matrix.os }})
    needs: [changes, build-snapshot]
    if: >-
      (needs.changes.outputs.rust == 'true' || needs.changes.outputs.src == 'true') &&
      (github.event_name != 'push' || github.ref_name != 'main') &&
      (needs.build-snapshot.result == 'success' || needs.build-snapshot.result == 'skipped')
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [namespace-profile-rari-linux-amd64, namespace-profile-rari-windows-amd64]
        exclude:
          - os: ${{ github.event_name == 'merge_group' && 'namespace-profile-rari-windows-amd64' || '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: nightly

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libfontconfig1-dev mold

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install fontconfig:x64-windows
        shell: pwsh

      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: rust-${{ runner.os }}

      - name: Download snapshot
        if: needs.build-snapshot.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: v8-snapshot
          path: crates/rari/snapshots

      - name: Build rari binary (Windows)
        if: runner.os == 'Windows'
        run: cargo build --bin rari
        env:
          AWS_LC_SYS_PREBUILT_NASM: 1
          PKG_CONFIG_PATH: C:\vcpkg\installed\x64-windows\lib\pkgconfig
          VCPKG_ROOT: C:\vcpkg

      - name: Build rari binary (Linux)
        if: runner.os != 'Windows'
        run: cargo build --bin rari
        env:
          RUSTFLAGS: -C link-arg=-fuse-ld=mold

      - name: Upload binary (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rari-binary-linux
          path: target/debug/rari
          if-no-files-found: error
          retention-days: 1

      - name: Upload binary (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rari-binary-windows
          path: target/debug/rari.exe
          if-no-files-found: error
          retention-days: 1

      - name: Cancel workflow on failure
        if: failure() && github.event_name == 'merge_group'
        run: gh run cancel ${{ github.run_id }} --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}

  build-use-cache-addon:
    name: Build rari_use_cache.node (${{ matrix.os }})
    needs: [changes]
    if: needs.changes.outputs.use_cache_crate == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        exclude:
          - os: ${{ github.event_name == 'merge_group' && 'windows-latest' || '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: nightly

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config mold

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Cache Rust (use-cache crate only)
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: use-cache-${{ runner.os }}
          workspaces: crates/rari-use-cache

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build rari_use_cache.node (Linux)
        if: runner.os == 'Linux'
        run: |
          cd crates/rari-use-cache
          pnpm exec napi build --release --strip --platform
        env:
          RUSTFLAGS: -C link-arg=-fuse-ld=mold

      - name: Build rari_use_cache.node (Windows)
        if: runner.os == 'Windows'
        run: |
          cd crates/rari-use-cache
          pnpm exec napi build --release --strip --platform

      - name: Copy addon to platform package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p packages/use-cache-linux-x64
          cp crates/rari-use-cache/*.linux-x64-gnu.node packages/use-cache-linux-x64/rari_use_cache.node
          cp .github/templates/js/use-cache-platform.js packages/use-cache-linux-x64/index.js
          sed -e 's/{PLATFORM}/linux-x64/g' \
              -e 's/{VERSION}/0.0.0/g' \
              -e 's/{OS}/linux/g' \
              -e 's/{CPU}/x64/g' \
              .github/templates/package-json/use-cache-platform.json > packages/use-cache-linux-x64/package.json

      - name: Copy addon to platform package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path packages/use-cache-win32-x64
          Copy-Item crates/rari-use-cache/*.win32-x64-msvc.node packages/use-cache-win32-x64/rari_use_cache.node
          Copy-Item .github/templates/js/use-cache-platform.js packages/use-cache-win32-x64/index.js
          (Get-Content .github/templates/package-json/use-cache-platform.json) `
            -replace '\{PLATFORM\}', 'win32-x64' `
            -replace '\{VERSION\}', '0.0.0' `
            -replace '\{OS\}', 'win32' `
            -replace '\{CPU\}', 'x64' |
            Out-File -FilePath packages/use-cache-win32-x64/package.json -Encoding UTF8

      - name: Upload addon (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: use-cache-linux-x64
          path: |
            packages/use-cache-linux-x64/rari_use_cache.node
            packages/use-cache-linux-x64/index.js
            packages/use-cache-linux-x64/package.json
          if-no-files-found: error
          retention-days: 1

      - name: Cache addon (Linux)
        if: runner.os == 'Linux'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: packages/use-cache-linux-x64
          key: use-cache-linux-x64-${{ hashFiles('crates/rari-use-cache/**', 'Cargo.lock') }}

      - name: Upload addon (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: use-cache-win32-x64
          path: |
            packages/use-cache-win32-x64/rari_use_cache.node
            packages/use-cache-win32-x64/index.js
            packages/use-cache-win32-x64/package.json
          if-no-files-found: error
          retention-days: 1

      - name: Cache addon (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: packages/use-cache-win32-x64
          key: use-cache-win32-x64-${{ hashFiles('crates/rari-use-cache/**', 'Cargo.lock') }}

  build:
    needs: [changes]
    if: needs.changes.outputs.src == 'true' || needs.changes.outputs.rust == 'true'
    runs-on: namespace-profile-rari-linux-amd64
    timeout-minutes: 10
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore use-cache addon from cache
        id: cache-addon
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: packages/use-cache-linux-x64
          key: use-cache-linux-x64-${{ hashFiles('crates/rari-use-cache/**', 'Cargo.lock') }}
          restore-keys: |
            use-cache-linux-x64-

      - name: Download use-cache addon
        if: steps.cache-addon.outputs.cache-hit != 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: use-cache-linux-x64
          path: packages/use-cache-linux-x64
          if-no-files-found: ignore

      - name: Build packages
        run: |
          pnpm --filter=@rari/use-cache run build
          pnpm --filter=@rari/logger run build
          pnpm --filter=@rari/deploy run build
          pnpm --filter=rari run build
          pnpm --filter=create-rari-app run build

      - name: Typecheck packages
        run: |
          pnpm --filter=rari run typecheck
          pnpm --filter=create-rari-app run typecheck

      - name: Verify dist outputs
        run: |
          test -d packages/use-cache/dist
          test -d packages/logger/dist
          test -d packages/deploy/dist
          test -d packages/rari/dist
          test -d packages/create-rari-app/dist

      - name: Upload dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          if-no-files-found: error
          retention-days: 3
          name: dist
          path: |
            packages/use-cache/dist/**
            packages/logger/dist/**
            packages/deploy/dist/**
            packages/rari/dist/**
            packages/create-rari-app/dist/**

      - name: Cancel workflow on failure
        if: failure() && github.event_name == 'merge_group'
        run: gh run cancel ${{ github.run_id }} --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}

  lint-and-test:
    needs: [changes, build]
    if: needs.changes.outputs.src == 'true' || needs.changes.outputs.rust == 'true'
    runs-on: namespace-profile-rari-linux-amd64
    timeout-minutes: 15
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: .

      - name: Restore use-cache addon from cache
        id: cache-addon
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: packages/use-cache-linux-x64
          key: use-cache-linux-x64-${{ hashFiles('crates/rari-use-cache/**', 'Cargo.lock') }}
          restore-keys: |
            use-cache-linux-x64-

      - name: Download use-cache addon
        if: steps.cache-addon.outputs.cache-hit != 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: use-cache-linux-x64
          path: packages/use-cache-linux-x64
          if-no-files-found: ignore

      - name: Lint
        run: pnpm lint

      - name: Test (unit)
        run: pnpm test:unit:run

      - name: Cancel workflow on failure
        if: failure() && github.event_name == 'merge_group'
        run: gh run cancel ${{ github.run_id }} --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}

  test-e2e:
    if: (needs.changes.outputs.src == 'true' || needs.changes.outputs.rust == 'true') && (github.event_name != 'push' || github.ref_name != 'main')
    runs-on: ${{ matrix.os }}
    permissions:
      actions: write
      contents: read
    needs:
      - changes
      - build
      - build-rari-binary
    strategy:
      fail-fast: ${{ github.event_name == 'merge_group' }}
      matrix:
        os: [namespace-profile-rari-linux-amd64, namespace-profile-rari-windows-amd64]
        node: ['lts/*']
        exclude:
          - os: ${{ github.event_name == 'merge_group' && 'namespace-profile-rari-windows-amd64' || '' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Restore dist cache
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: .

      - name: Download rari binary (Linux)
        if: runner.os == 'Linux'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rari-binary-linux
          path: packages/rari-linux-x64/bin

      - name: Download rari binary (Windows)
        if: runner.os == 'Windows'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rari-binary-windows
          path: packages/rari-win32-x64/bin

      - name: Restore use-cache addon from cache (Linux)
        if: runner.os == 'Linux'
        id: cache-addon-linux
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: packages/use-cache-linux-x64
          key: use-cache-linux-x64-${{ hashFiles('crates/rari-use-cache/**', 'Cargo.lock') }}
          restore-keys: |
            use-cache-linux-x64-

      - name: Restore use-cache addon from cache (Windows)
        if: runner.os == 'Windows'
        id: cache-addon-windows
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: packages/use-cache-win32-x64
          key: use-cache-win32-x64-${{ hashFiles('crates/rari-use-cache/**', 'Cargo.lock') }}
          restore-keys: |
            use-cache-win32-x64-

      - name: Download rari_use_cache addon (Linux)
        if: runner.os == 'Linux' && steps.cache-addon-linux.outputs.cache-hit != 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: use-cache-linux-x64
          path: packages/use-cache-linux-x64
          if-no-files-found: ignore

      - name: Download rari_use_cache addon (Windows)
        if: runner.os == 'Windows' && steps.cache-addon-windows.outputs.cache-hit != 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: use-cache-win32-x64
          path: packages/use-cache-win32-x64
          if-no-files-found: ignore

      - name: Make binary executable (Linux)
        if: runner.os == 'Linux'
        run: chmod +x packages/rari-linux-x64/bin/rari

      - name: Set up cache (Linux)
        if: runner.os == 'Linux'
        uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1.4.3
        with:
          cache: |
            playwright
            apt
            pnpm

      - name: Cache Playwright browsers (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~\AppData\Local\ms-playwright
          key: playwright-win-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: playwright-win-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright
        run: pnpm playwright install chromium --with-deps

      - name: Test (e2e)
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-${{ matrix.os }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

      - name: Cancel workflow on failure
        if: failure() && github.event_name == 'merge_group'
        run: gh run cancel ${{ github.run_id }} --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}

  ci-ok:
    if: always()
    runs-on: namespace-profile-rari-linux-amd64
    needs:
      - changes
      - build-snapshot
      - rust-check
      - build
      - build-rari-binary
      - build-use-cache-addon
      - lint-and-test
      - test-e2e
    steps:
      - name: Check required jobs
        run: |
          results=(
            "${{ needs.changes.result }}"
            "${{ needs.build-snapshot.result }}"
            "${{ needs.rust-check.result }}"
            "${{ needs.build.result }}"
            "${{ needs.build-rari-binary.result }}"
            "${{ needs.build-use-cache-addon.result }}"
            "${{ needs.lint-and-test.result }}"
            "${{ needs.test-e2e.result }}"
          )

          for result in "${results[@]}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "One or more required jobs failed or were cancelled: $result"
              exit 1
            fi
          done

          echo "All required jobs passed or were skipped."
