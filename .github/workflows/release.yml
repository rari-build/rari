name: Release

on:
  push:
    tags:
      - 'v*'
      - 'rari@*'
      - 'create-rari-app@*'
      - '@rari/use-cache@*'
      - 'use-cache-binaries@*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-snapshot:
    name: Build V8 snapshot
    runs-on: namespace-profile-rari-linux-amd64
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: nightly

      - uses: ./.github/actions/setup-rust-build-deps

      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: release-snapshot-linux

      - name: Bundle React ESM vendor files
        uses: ./.github/actions/bundle-react-esm

      - name: Create snapshot placeholder
        run: |
          mkdir -p crates/rari/snapshots
          touch crates/rari/snapshots/RARI_SNAPSHOT.bin
          echo 'pub static RESIDUAL_LAZY_ESM_SOURCES: &[(&str, &str)] = &[];' > crates/rari/snapshots/residual_lazy_sources.rs
          echo 'pub static RESIDUAL_LAZY_JS_SOURCES: &[(&str, &str)] = &[];' >> crates/rari/snapshots/residual_lazy_sources.rs

      - name: Generate V8 snapshot
        run: cargo run --release --manifest-path tools/snapshot/Cargo.toml -- crates/rari/snapshots
        env:
          RUSTFLAGS: -C link-arg=-fuse-ld=mold

      - name: Upload snapshot
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: v8-snapshot
          path: |
            crates/rari/snapshots/RARI_SNAPSHOT.bin
            crates/rari/snapshots/residual_lazy_sources.rs
          if-no-files-found: error
          retention-days: 7

  build-binaries:
    name: Build ${{ matrix.target }}
    needs: build-snapshot
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: namespace-profile-rari-linux-amd64
            name: rari-linux-x64
            platform: linux-x64
          - target: aarch64-unknown-linux-gnu
            os: namespace-profile-rari-linux-arm64
            name: rari-linux-arm64
            platform: linux-arm64
          - target: x86_64-apple-darwin
            os: namespace-profile-rari-macos-arm64
            name: rari-darwin-x64
            platform: darwin-x64
          - target: aarch64-apple-darwin
            os: namespace-profile-rari-macos-arm64
            name: rari-darwin-arm64
            platform: darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: namespace-profile-rari-windows-amd64
            name: rari-win32-x64.exe
            vcpkg_triplet: x64-windows
            platform: win32-x64
          - target: aarch64-pc-windows-msvc
            os: namespace-profile-rari-windows-amd64
            name: rari-win32-arm64.exe
            vcpkg_triplet: arm64-windows
            platform: win32-arm64

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: nightly
          targets: ${{ matrix.target }}

      - uses: ./.github/actions/setup-rust-build-deps
        with:
          vcpkg-triplet: ${{ matrix.vcpkg_triplet }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: release-binary-${{ matrix.target }}

      - name: Bundle React ESM vendor files
        uses: ./.github/actions/bundle-react-esm

      - name: Download V8 snapshot
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: v8-snapshot
          path: crates/rari/snapshots

      - name: Build binary (Linux)
        if: runner.os == 'Linux'
        run: cargo build --release --target ${{ matrix.target }} --bin rari
        env:
          RUSTFLAGS: -C link-arg=-fuse-ld=mold

      - name: Build binary (macOS)
        if: runner.os == 'macOS'
        run: cargo build --release --target ${{ matrix.target }} --bin rari
        env:
          RUSTFLAGS: '' # Override .cargo/config.toml to use default linker

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: cargo build --release --target ${{ matrix.target }} --bin rari
        env:
          AWS_LC_SYS_PREBUILT_NASM: 1
          PKG_CONFIG_PATH: C:\vcpkg\installed\${{ matrix.vcpkg_triplet }}\lib\pkgconfig
          VCPKG_ROOT: C:\vcpkg

      - name: Prepare binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p binaries
          cp target/${{ matrix.target }}/release/rari binaries/${{ matrix.name }}
          chmod +x binaries/${{ matrix.name }}

      - name: Prepare binary (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir binaries
          copy target\${{ matrix.target }}\release\rari.exe binaries\${{ matrix.name }}

      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.name }}
          path: binaries/${{ matrix.name }}
          if-no-files-found: error
          retention-days: 7

  npm-release-platform:
    needs: build-binaries
    runs-on: namespace-profile-rari-linux-amd64
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write

    strategy:
      matrix:
        include:
          - platform: linux-x64
            binary: rari-linux-x64
          - platform: linux-arm64
            binary: rari-linux-arm64
          - platform: darwin-x64
            binary: rari-darwin-x64
          - platform: darwin-arm64
            binary: rari-darwin-arm64
          - platform: win32-x64
            binary: rari-win32-x64.exe
          - platform: win32-arm64
            binary: rari-win32-arm64.exe

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.14.0
          package-manager-cache: false

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Download platform binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ matrix.binary }}
          path: platform-binary

      - name: Prepare platform package
        run: |
          PACKAGE_NAME="rari-${{ matrix.platform }}"
          PACKAGE_DIR="packages/${PACKAGE_NAME}"

          mkdir -p "${PACKAGE_DIR}/bin"

          BINARY_FILE=$(find platform-binary -name "*rari*" -type f | head -1)

          if [[ "${{ matrix.platform }}" == win32-* ]]; then
            cp "${BINARY_FILE}" "${PACKAGE_DIR}/bin/rari.exe"
            chmod +x "${PACKAGE_DIR}/bin/rari.exe"
          else
            cp "${BINARY_FILE}" "${PACKAGE_DIR}/bin/rari"
            chmod +x "${PACKAGE_DIR}/bin/rari"
          fi

          ls -la "${PACKAGE_DIR}/bin/"

      - name: Generate package.json
        run: |
          PACKAGE_NAME="rari-${{ matrix.platform }}"
          PACKAGE_DIR="packages/${PACKAGE_NAME}"
          VERSION="${GITHUB_REF#refs/tags/v}"

          case "${{ matrix.platform }}" in
            darwin-arm64)
              OS="darwin"; CPU="arm64"; DESCRIPTION="macOS ARM64 binary"
              KEYWORDS='"darwin", "arm64", "macos", "apple-silicon",'
              BIN_PATH="./bin/rari"; BIN_FILE="bin/rari"
              ;;
            darwin-x64)
              OS="darwin"; CPU="x64"; DESCRIPTION="macOS x64 binary"
              KEYWORDS='"darwin", "x64", "macos", "intel",'
              BIN_PATH="./bin/rari"; BIN_FILE="bin/rari"
              ;;
            linux-arm64)
              OS="linux"; CPU="arm64"; DESCRIPTION="Linux ARM64 binary"
              KEYWORDS='"linux", "arm64",'
              BIN_PATH="./bin/rari"; BIN_FILE="bin/rari"
              ;;
            linux-x64)
              OS="linux"; CPU="x64"; DESCRIPTION="Linux x64 binary"
              KEYWORDS='"linux", "x64",'
              BIN_PATH="./bin/rari"; BIN_FILE="bin/rari"
              ;;
            win32-x64)
              OS="win32"; CPU="x64"; DESCRIPTION="Windows x64 binary"
              KEYWORDS='"win32", "windows", "x64",'
              BIN_PATH="./bin/rari.exe"; BIN_FILE="bin/rari.exe"
              ;;
            win32-arm64)
              OS="win32"; CPU="arm64"; DESCRIPTION="Windows ARM64 binary"
              KEYWORDS='"win32", "windows", "arm64",'
              BIN_PATH="./bin/rari.exe"; BIN_FILE="bin/rari.exe"
              ;;
          esac

          cp .github/templates/package-json/platform.json "${PACKAGE_DIR}/package.json"
          sed -i "s|{NAME}|${PACKAGE_NAME}|g"             "${PACKAGE_DIR}/package.json"
          sed -i "s|{VERSION}|${VERSION}|g"               "${PACKAGE_DIR}/package.json"
          sed -i "s|{DESCRIPTION}|${DESCRIPTION}|g"       "${PACKAGE_DIR}/package.json"
          sed -i "s|{OS}|${OS}|g"                         "${PACKAGE_DIR}/package.json"
          sed -i "s|{CPU}|${CPU}|g"                       "${PACKAGE_DIR}/package.json"
          sed -i "s|{KEYWORDS}|${KEYWORDS}|g"             "${PACKAGE_DIR}/package.json"
          sed -i "s|{BIN_PATH}|${BIN_PATH}|g"             "${PACKAGE_DIR}/package.json"
          sed -i "s|{BIN_FILE}|${BIN_FILE}|g"             "${PACKAGE_DIR}/package.json"

          node --input-type=module -e "
            import { readFileSync, writeFileSync } from 'fs';
            const f = '${PACKAGE_DIR}/package.json';
            writeFileSync(f, JSON.stringify(JSON.parse(readFileSync(f, 'utf8')), null, 2) + '\n');
          "
          echo "✓ Generated package.json for ${PACKAGE_NAME}@${VERSION}"

      - name: Copy LICENSE and generate README
        run: |
          PACKAGE_NAME="rari-${{ matrix.platform }}"
          PACKAGE_DIR="packages/${PACKAGE_NAME}"

          cp LICENSE "${PACKAGE_DIR}/LICENSE"

          case "${{ matrix.platform }}" in
            darwin-arm64) PLATFORM_NAME="macOS ARM64 (Apple Silicon)"; OS_NAME="macOS"; ARCH="ARM64"; DESCRIPTION="Apple Silicon Macs (M1, M2, M3, M4)" ;;
            darwin-x64)   PLATFORM_NAME="macOS x64 (Intel)";           OS_NAME="macOS"; ARCH="x64";  DESCRIPTION="Intel-based Macs" ;;
            linux-arm64)  PLATFORM_NAME="Linux ARM64";                  OS_NAME="Linux"; ARCH="ARM64"; DESCRIPTION="ARM64/aarch64 Linux systems" ;;
            linux-x64)    PLATFORM_NAME="Linux x64";                    OS_NAME="Linux"; ARCH="x64";  DESCRIPTION="x86_64 Linux systems" ;;
            win32-x64)    PLATFORM_NAME="Windows x64";                  OS_NAME="Windows"; ARCH="x64";  DESCRIPTION="x86_64 Windows systems" ;;
            win32-arm64)  PLATFORM_NAME="Windows ARM64";                OS_NAME="Windows"; ARCH="ARM64"; DESCRIPTION="ARM64 Windows systems" ;;
          esac

          cp .github/templates/readme/platform.md "${PACKAGE_DIR}/README.md"
          sed -i "s|\${PACKAGE_NAME}|${PACKAGE_NAME}|g"   "${PACKAGE_DIR}/README.md"
          sed -i "s|\${PLATFORM_NAME}|${PLATFORM_NAME}|g" "${PACKAGE_DIR}/README.md"
          sed -i "s|\${OS_NAME}|${OS_NAME}|g"             "${PACKAGE_DIR}/README.md"
          sed -i "s|\${ARCH}|${ARCH}|g"                   "${PACKAGE_DIR}/README.md"
          sed -i "s|\${DESCRIPTION}|${DESCRIPTION}|g"     "${PACKAGE_DIR}/README.md"

      - name: Publish platform package
        run: |
          PACKAGE_NAME="rari-${{ matrix.platform }}"
          cd "packages/${PACKAGE_NAME}"
          npm pkg fix
          echo "Publishing ${PACKAGE_NAME}..."
          npm publish --access public
          echo "✓ Published ${PACKAGE_NAME}"

  npm-release-package:
    runs-on: namespace-profile-rari-linux-amd64
    if: startsWith(github.ref, 'refs/tags/rari@') || startsWith(github.ref, 'refs/tags/create-rari-app@')
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Determine package info
        id: pkg
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PACKAGE_NAME="${TAG%%@*}"
          VERSION="${TAG#*@}"
          echo "tag=${TAG}"             >> "$GITHUB_OUTPUT"
          echo "name=${PACKAGE_NAME}"   >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}"     >> "$GITHUB_OUTPUT"
          echo "📦 Publishing ${PACKAGE_NAME}@${VERSION}"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.14.0
          package-manager-cache: false

      - name: Upgrade npm
        run: npm install -g npm@latest

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          npm_config_trust_lockfile: 'true'

      - name: Build package
        run: pnpm --filter "${{ steps.pkg.outputs.name }}" build

      - name: Copy LICENSE and README
        run: |
          PACKAGE_DIR="packages/${{ steps.pkg.outputs.name }}"
          cp LICENSE "${PACKAGE_DIR}/LICENSE"

          if [[ "${{ steps.pkg.outputs.name }}" == "rari" ]]; then
            cp .github/templates/readme/rari.md "${PACKAGE_DIR}/README.md"
          fi

          if [[ "${{ steps.pkg.outputs.name }}" == "create-rari-app" ]]; then
            cp .github/templates/readme/create-rari-app.md "${PACKAGE_DIR}/README.md"
          fi

      - name: Publish to npm
        run: |
          cd "packages/${{ steps.pkg.outputs.name }}"

          VERSION="${{ steps.pkg.outputs.version }}"
          TARBALL=$(pnpm pack | tail -1)
          echo "Packed: ${TARBALL}"

          if [[ "${VERSION}" == *"-"* ]]; then
            echo "Publishing with tag 'next'..."
            npm publish "${TARBALL}" --access public --tag next
          else
            echo "Publishing with tag 'latest'..."
            npm publish "${TARBALL}" --access public
          fi

  build-use-cache-addons:
    name: Build use-cache addon for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/use-cache-binaries@') || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: namespace-profile-rari-linux-amd64
            platform: linux-x64
          - target: aarch64-unknown-linux-gnu
            os: namespace-profile-rari-linux-arm64
            platform: linux-arm64
          - target: x86_64-apple-darwin
            os: namespace-profile-rari-macos-arm64
            platform: darwin-x64
          - target: aarch64-apple-darwin
            os: namespace-profile-rari-macos-arm64
            platform: darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: namespace-profile-rari-windows-amd64
            platform: win32-x64
          - target: aarch64-pc-windows-msvc
            os: namespace-profile-rari-windows-amd64
            platform: win32-arm64

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: nightly
          targets: ${{ matrix.target }}

      - uses: ./.github/actions/setup-rust-build-deps
        with:
          fontconfig: 'false'

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Cache pnpm store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: release-addon-${{ matrix.target }}
          workspaces: crates/rari_use_cache

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build addon (Linux)
        if: runner.os == 'Linux'
        run: |
          cd crates/rari_use_cache
          pnpm exec napi build --release --strip --platform --target ${{ matrix.target }}
        env:
          RUSTFLAGS: -C link-arg=-fuse-ld=mold

      - name: Build addon (macOS)
        if: runner.os == 'macOS'
        run: |
          cd crates/rari_use_cache
          pnpm exec napi build --release --strip --platform --target ${{ matrix.target }}

      - name: Build addon (Windows)
        if: runner.os == 'Windows'
        run: |
          cd crates/rari_use_cache
          pnpm exec napi build --release --strip --platform --target ${{ matrix.target }}
        env:
          AWS_LC_SYS_PREBUILT_NASM: 1

      - name: Collect addon artifact
        shell: bash
        run: |
          mkdir -p addon-output
          find crates/rari_use_cache -name "*.node" -exec cp {} addon-output/rari_use_cache.node \;
          ls -la addon-output/

      - name: Upload addon artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: use-cache-addon-${{ matrix.platform }}
          path: addon-output/rari_use_cache.node
          if-no-files-found: error
          retention-days: 7

  npm-release-use-cache-platform:
    needs: build-use-cache-addons
    runs-on: namespace-profile-rari-linux-amd64
    if: startsWith(github.ref, 'refs/tags/use-cache-binaries@')
    permissions:
      contents: read
      id-token: write

    strategy:
      matrix:
        platform:
          - linux-x64
          - linux-arm64
          - darwin-x64
          - darwin-arm64
          - win32-x64
          - win32-arm64

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.14.0
          package-manager-cache: false

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Download platform addon
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: use-cache-addon-${{ matrix.platform }}
          path: platform-addon

      - name: Prepare platform package
        run: |
          PACKAGE_NAME="@rari/use-cache-${{ matrix.platform }}"
          PACKAGE_DIR="packages/use-cache-${{ matrix.platform }}"
          VERSION="${GITHUB_REF#refs/tags/use-cache-binaries@}"

          mkdir -p "${PACKAGE_DIR}"
          cp platform-addon/rari_use_cache.node "${PACKAGE_DIR}/rari_use_cache.node"

          case "${{ matrix.platform }}" in
            darwin-arm64) OS="darwin"; CPU="arm64"; PLATFORM_NAME="macOS ARM64 (Apple Silicon)"; OS_NAME="macOS";   ARCH="ARM64"; DESCRIPTION="Apple Silicon Macs (M1, M2, M3, M4)" ;;
            darwin-x64)   OS="darwin"; CPU="x64";   PLATFORM_NAME="macOS x64 (Intel)";           OS_NAME="macOS";   ARCH="x64";   DESCRIPTION="Intel-based Macs" ;;
            linux-arm64)  OS="linux";  CPU="arm64"; PLATFORM_NAME="Linux ARM64";                  OS_NAME="Linux";   ARCH="ARM64"; DESCRIPTION="ARM64/aarch64 Linux systems" ;;
            linux-x64)    OS="linux";  CPU="x64";   PLATFORM_NAME="Linux x64";                    OS_NAME="Linux";   ARCH="x64";   DESCRIPTION="x86_64 Linux systems" ;;
            win32-x64)    OS="win32";  CPU="x64";   PLATFORM_NAME="Windows x64";                  OS_NAME="Windows"; ARCH="x64";   DESCRIPTION="x86_64 Windows systems" ;;
            win32-arm64)  OS="win32";  CPU="arm64"; PLATFORM_NAME="Windows ARM64";                OS_NAME="Windows"; ARCH="ARM64"; DESCRIPTION="ARM64 Windows systems" ;;
          esac

          cp .github/templates/package-json/use-cache-platform.json "${PACKAGE_DIR}/package.json"
          sed -i "s|{VERSION}|${VERSION}|g"              "${PACKAGE_DIR}/package.json"
          sed -i "s|{PLATFORM}|${{ matrix.platform }}|g" "${PACKAGE_DIR}/package.json"
          sed -i "s|{OS}|${OS}|g"                        "${PACKAGE_DIR}/package.json"
          sed -i "s|{CPU}|${CPU}|g"                      "${PACKAGE_DIR}/package.json"

          node --input-type=module -e "
            import { readFileSync, writeFileSync } from 'fs';
            const f = '${PACKAGE_DIR}/package.json';
            writeFileSync(f, JSON.stringify(JSON.parse(readFileSync(f, 'utf8')), null, 2) + '\n');
          "

          cat > "${PACKAGE_DIR}/index.js" << 'EOF'
          import { createRequire } from 'node:module'
          import { dirname, join } from 'node:path'
          import { fileURLToPath } from 'node:url'

          const require = createRequire(import.meta.url)
          const __dirname = dirname(fileURLToPath(import.meta.url))

          const addon = require(join(__dirname, 'rari_use_cache.node'))

          export default addon
          EOF

          cp LICENSE "${PACKAGE_DIR}/LICENSE"

          cp .github/templates/readme/use-cache-platform.md "${PACKAGE_DIR}/README.md"
          sed -i "s|\${PACKAGE_NAME}|use-cache-${{ matrix.platform }}|g" "${PACKAGE_DIR}/README.md"
          sed -i "s|\${PLATFORM_NAME}|${PLATFORM_NAME}|g"                "${PACKAGE_DIR}/README.md"
          sed -i "s|\${OS_NAME}|${OS_NAME}|g"                            "${PACKAGE_DIR}/README.md"
          sed -i "s|\${ARCH}|${ARCH}|g"                                  "${PACKAGE_DIR}/README.md"
          sed -i "s|\${DESCRIPTION}|${DESCRIPTION}|g"                    "${PACKAGE_DIR}/README.md"

          echo "✓ Generated package files for ${PACKAGE_NAME}@${VERSION}"

      - name: Publish platform package
        run: |
          PACKAGE_DIR="packages/use-cache-${{ matrix.platform }}"
          VERSION="${GITHUB_REF#refs/tags/use-cache-binaries@}"

          cd "${PACKAGE_DIR}"
          npm pkg fix

          if [[ "${VERSION}" == *"-"* ]]; then
            echo "Publishing @rari/use-cache-${{ matrix.platform }} with tag 'next'..."
            npm publish --access public --tag next
          else
            echo "Publishing @rari/use-cache-${{ matrix.platform }} with tag 'latest'..."
            npm publish --access public
          fi

          echo "✓ Published @rari/use-cache-${{ matrix.platform }}"

  npm-release-use-cache:
    runs-on: namespace-profile-rari-linux-amd64
    if: startsWith(github.ref, 'refs/tags/@rari/use-cache@')
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Determine package version
        id: pkg
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#@rari/use-cache@}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "📦 Publishing @rari/use-cache@${VERSION}"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.14.0
          package-manager-cache: false

      - name: Upgrade npm
        run: npm install -g npm@latest

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          npm_config_trust_lockfile: 'true'

      - name: Build package
        run: pnpm --filter "@rari/use-cache" build

      - name: Copy LICENSE
        run: cp LICENSE packages/use-cache/LICENSE

      - name: Publish to npm
        run: |
          cd "packages/use-cache"

          VERSION="${{ steps.pkg.outputs.version }}"
          TARBALL=$(pnpm pack | tail -1)
          echo "Packed: ${TARBALL}"

          if [[ "${VERSION}" == *"-"* ]]; then
            echo "Publishing with tag 'next'..."
            npm publish "${TARBALL}" --access public --tag next
          else
            echo "Publishing with tag 'latest'..."
            npm publish "${TARBALL}" --access public
          fi
