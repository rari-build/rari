name: Release

on:
  push:
    tags:
      - 'v*'
      - 'rari@*'
      - 'create-rari-app@*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/v')  || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            name: rari-linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
            name: rari-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-15-intel
            name: rari-darwin-x64
          - target: aarch64-apple-darwin
            os: macos-15
            name: rari-darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: rari-win32-x64.exe
            vcpkg_triplet: x64-windows
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
            name: rari-win32-arm64.exe
            vcpkg_triplet: arm64-windows

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: nightly
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libfontconfig1-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew list pkg-config &>/dev/null || brew install pkg-config
          brew list fontconfig &>/dev/null || brew install fontconfig

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install fontconfig:${{ matrix.vcpkg_triplet }}
        shell: pwsh

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cargo/registry/cache
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cargo/registry/index
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache cargo build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-build-

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p crates/rari/snapshots
          touch crates/rari/snapshots/RARI_SNAPSHOT.bin
          echo 'pub static RESIDUAL_LAZY_ESM_SOURCES: &[(&str, &str)] = &[];' > crates/rari/snapshots/residual_lazy_sources.rs
          echo 'pub static RESIDUAL_LAZY_JS_SOURCES: &[(&str, &str)] = &[];' >> crates/rari/snapshots/residual_lazy_sources.rs
          cargo run --release --manifest-path tools/snapshot/Cargo.toml -- crates/rari/snapshots
          cargo build --release --target ${{ matrix.target }} --bin rari
        env:
          AWS_LC_SYS_PREBUILT_NASM: 1
          PKG_CONFIG_PATH: C:\vcpkg\installed\${{ matrix.vcpkg_triplet }}\lib\pkgconfig
          VCPKG_ROOT: C:\vcpkg

      - name: Build binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p crates/rari/snapshots
          touch crates/rari/snapshots/RARI_SNAPSHOT.bin
          echo 'pub static RESIDUAL_LAZY_ESM_SOURCES: &[(&str, &str)] = &[];' > crates/rari/snapshots/residual_lazy_sources.rs
          echo 'pub static RESIDUAL_LAZY_JS_SOURCES: &[(&str, &str)] = &[];' >> crates/rari/snapshots/residual_lazy_sources.rs
          cargo run --release --manifest-path tools/snapshot/Cargo.toml -- crates/rari/snapshots
          cargo build --release --target ${{ matrix.target }} --bin rari

      - name: Prepare binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p binaries
          cp target/${{ matrix.target }}/release/rari binaries/${{ matrix.name }}
          chmod +x binaries/${{ matrix.name }}

      - name: Prepare binary (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir binaries
          copy target\${{ matrix.target }}\release\rari.exe binaries\${{ matrix.name }}

      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.name }}
          path: binaries/${{ matrix.name }}

  npm-release-platform:
    needs: build-binaries
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write

    strategy:
      matrix:
        include:
          - platform: linux-x64
            binary: rari-linux-x64
          - platform: linux-arm64
            binary: rari-linux-arm64
          - platform: darwin-x64
            binary: rari-darwin-x64
          - platform: darwin-arm64
            binary: rari-darwin-arm64
          - platform: win32-x64
            binary: rari-win32-x64.exe
          - platform: win32-arm64
            binary: rari-win32-arm64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.14.0
          package-manager-cache: false

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Download platform binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ matrix.binary }}
          path: platform-binary

      - name: Prepare platform package
        run: |
          PACKAGE_NAME="rari-${{ matrix.platform }}"
          PACKAGE_DIR="packages/${PACKAGE_NAME}"

          mkdir -p "${PACKAGE_DIR}/bin"

          BINARY_FILE=$(find platform-binary -name "*rari*" -type f | head -1)

          if [[ "${{ matrix.platform }}" == win32-* ]]; then
            cp "${BINARY_FILE}" "${PACKAGE_DIR}/bin/rari.exe"
            chmod +x "${PACKAGE_DIR}/bin/rari.exe"
          else
            cp "${BINARY_FILE}" "${PACKAGE_DIR}/bin/rari"
            chmod +x "${PACKAGE_DIR}/bin/rari"
          fi

          ls -la "${PACKAGE_DIR}/bin/"

      - name: Copy LICENSE
        run: |
          PACKAGE_NAME="rari-${{ matrix.platform }}"
          PACKAGE_DIR="packages/${PACKAGE_NAME}"

          cp LICENSE "${PACKAGE_DIR}/LICENSE"
          echo "✓ Copied LICENSE to ${PACKAGE_NAME}"

      - name: Generate README
        run: |
          PACKAGE_NAME="rari-${{ matrix.platform }}"
          PACKAGE_DIR="packages/${PACKAGE_NAME}"

          # Set platform-specific info
          case "${{ matrix.platform }}" in
            darwin-arm64)
              PLATFORM_NAME="macOS ARM64 (Apple Silicon)"
              OS_NAME="macOS"
              ARCH="ARM64"
              DESCRIPTION="Apple Silicon Macs (M1, M2, M3, M4)"
              ;;
            darwin-x64)
              PLATFORM_NAME="macOS x64 (Intel)"
              OS_NAME="macOS"
              ARCH="x64"
              DESCRIPTION="Intel-based Macs"
              ;;
            linux-arm64)
              PLATFORM_NAME="Linux ARM64"
              OS_NAME="Linux"
              ARCH="ARM64"
              DESCRIPTION="ARM64/aarch64 Linux systems"
              ;;
            linux-x64)
              PLATFORM_NAME="Linux x64"
              OS_NAME="Linux"
              ARCH="x64"
              DESCRIPTION="x86_64 Linux systems"
              ;;
            win32-x64)
              PLATFORM_NAME="Windows x64"
              OS_NAME="Windows"
              ARCH="x64"
              DESCRIPTION="x86_64 Windows systems"
              ;;
            win32-arm64)
              PLATFORM_NAME="Windows ARM64"
              OS_NAME="Windows"
              ARCH="ARM64"
              DESCRIPTION="ARM64 Windows systems"
              ;;
          esac

          cat > "${PACKAGE_DIR}/README.md" << 'EOF'
          # ${PACKAGE_NAME}

          > Platform-specific binary for rari on ${PLATFORM_NAME}

          This package contains the native ${OS_NAME} ${ARCH} binary for [rari](https://github.com/rari-build/rari), a high-performance React Server Components framework powered by Rust.

          ## Platform Support

          - **Operating System:** ${OS_NAME}
          - **Architecture:** ${ARCH}
          - **Target:** ${DESCRIPTION}

          ## Installation

          This package is automatically installed as an optional dependency when you install the main `rari` package:

          ```bash
          npm install rari
          ```

          You typically don't need to install this package directly. The main `rari` package will automatically download the correct binary for your platform.

          ## Usage

          This package is used internally by the `rari` CLI. After installing `rari`, you can use it directly:

          ```bash
          # Development server
          npx rari dev

          # Production build
          npx rari build

          # Start production server
          npx rari start
          ```

          ### Quick Start

          Create a new rari application:

          ```bash
          npm create rari-app@latest my-app
          cd my-app
          npm run dev
          ```

          Visit [rari.build](https://rari.build) for complete documentation.

          ## Links

          - **Documentation:** [rari.build/docs](https://rari.build/docs)
          - **GitHub:** [github.com/rari-build/rari](https://github.com/rari-build/rari)
          - **Discord:** [Join our community](https://discord.gg/GSh2Ak3b8Q)
          - **npm:** [npmjs.com/package/rari](https://www.npmjs.com/package/rari)

          ## License

          MIT License - see [LICENSE](https://github.com/rari-build/rari/blob/main/LICENSE) for details.
          EOF

          # Replace variables in the README (using | as delimiter to avoid issues with slashes)
          sed -i "s|\${PACKAGE_NAME}|${PACKAGE_NAME}|g" "${PACKAGE_DIR}/README.md"
          sed -i "s|\${PLATFORM_NAME}|${PLATFORM_NAME}|g" "${PACKAGE_DIR}/README.md"
          sed -i "s|\${OS_NAME}|${OS_NAME}|g" "${PACKAGE_DIR}/README.md"
          sed -i "s|\${ARCH}|${ARCH}|g" "${PACKAGE_DIR}/README.md"
          sed -i "s|\${DESCRIPTION}|${DESCRIPTION}|g" "${PACKAGE_DIR}/README.md"

          echo "Generated README for ${PACKAGE_NAME}"

      - name: Publish platform package
        run: |
          PACKAGE_NAME="rari-${{ matrix.platform }}"
          cd "packages/${PACKAGE_NAME}"
          echo "Publishing ${PACKAGE_NAME}..."
          npm publish --access public
          echo "Successfully published ${PACKAGE_NAME}"

  npm-release-package:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/rari@') || startsWith(github.ref, 'refs/tags/create-rari-app@')
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Determine package info
        id: pkg
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PACKAGE_NAME="${TAG%%@*}"
          VERSION="${TAG#*@}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "📦 Publishing ${PACKAGE_NAME}@${VERSION}"

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.14.0
          package-manager-cache: false

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          npm_config_trust_lockfile: 'true'

      - name: Build package
        run: pnpm --filter "${{ steps.pkg.outputs.name }}..." build

      - name: Generate README and LICENSE
        run: |
          PACKAGE_DIR="packages/${{ steps.pkg.outputs.name }}"
          cp LICENSE "${PACKAGE_DIR}/LICENSE"

          if [[ "${{ steps.pkg.outputs.name }}" == "rari" ]]; then
            cat > "${PACKAGE_DIR}/README.md" << 'EOF'
          # rari

          > Runtime Accelerated Rendering Infrastructure

          **rari** is a high-performance React Server Components framework powered by a Rust runtime. Built for performance, scalability, and developer experience.

          ## Quick Start

          Create a new rari application in seconds:

          ```bash
          npm create rari-app@latest my-app
          cd my-app
          npm run dev
          ```

          That's it! Your app will be running at `http://localhost:5173`.

          Visit [rari.build/docs](https://rari.build/docs) for complete documentation, guides, and examples.

          ## Installation

          Install rari in an existing project:

          ```bash
          npm install rari react react-dom
          ```

          Or use the CLI to create a new project:

          ```bash
          npm create rari-app@latest
          ```

          ## Documentation

          **[Read the full documentation](https://rari.build/docs)** to learn more about:

          - Getting started with rari
          - App Router and file-based routing
          - Server Components and Client Components
          - Server Actions and data mutations
          - Streaming SSR and Suspense
          - Deployment and production optimization

          ## Contributing

          We welcome contributions! Here's how you can help:

          - **Report Bugs** - Found an issue? [Open a bug report](https://github.com/rari-build/rari/issues/new)
          - **Suggest Features** - Have ideas? [Share your suggestions](https://github.com/rari-build/rari/discussions)
          - **Improve Docs** - Help make our documentation better
          - **Submit PRs** - Check out our [Contributing Guide](https://github.com/rari-build/rari/blob/main/.github/CONTRIBUTING.md)

          ## Community

          - **Discord** - [Join our community](https://discord.gg/GSh2Ak3b8Q)
          - **GitHub** - [Star the repo](https://github.com/rari-build/rari)
          - **Documentation** - [rari.build/docs](https://rari.build/docs)

          ## License

          MIT License - see [LICENSE](https://github.com/rari-build/rari/blob/main/LICENSE) for details.
          EOF
          fi

          if [[ "${{ steps.pkg.outputs.name }}" == "create-rari-app" ]]; then
            cat > "${PACKAGE_DIR}/README.md" << 'EOF'
          # create-rari-app

          > Scaffold a new rari application with zero configuration

          The fastest way to get started with [rari](https://github.com/rari-build/rari), a high-performance React Server Components framework powered by Rust.

          ## Usage

          Create a new rari application interactively:

          ```bash
          npm create rari-app@latest
          ```

          Or specify a project name directly:

          ```bash
          npm create rari-app@latest my-app
          ```

          With other package managers:

          ```bash
          # pnpm
          pnpm create rari-app

          # yarn
          yarn create rari-app

          # bun
          bun create rari-app
          ```

          ## What You Get

          Running `create-rari-app` sets up a complete rari project with:

          - **App Router structure** - Pre-configured file-based routing
          - **TypeScript support** - Full type safety out of the box
          - **Development server** - Hot module reloading for instant feedback
          - **Example components** - Server and client component examples
          - **Production ready** - Optimized build configuration included

          ## Project Structure

          ```
          my-app/
          ├── app/
          │   ├── layout.tsx          # Root layout
          │   ├── page.tsx            # Home page
          │   └── global.css          # Global styles
          ├── public/                 # Static assets
          ├── package.json
          ├── tsconfig.json
          └── vite.config.ts
          ```

          ## Getting Started

          After creating your project:

          ```bash
          cd my-app
          npm install
          npm run dev
          ```

          Your app will be running at `http://localhost:5173`.

          ## Available Commands

          - `npm run dev` - Start development server with hot reloading
          - `npm run build` - Build for production
          - `npm run start` - Start production server
          - `npm run typecheck` - Run TypeScript type checking

          ## Templates

          `create-rari-app` includes a default template with:

          - React 19 with Server Components
          - TypeScript configuration
          - Vite integration
          - Example pages and components
          - CSS support

          ## Documentation

          Visit [rari.build/docs](https://rari.build/docs) for:

          - Complete documentation
          - Guides and tutorials
          - API reference
          - Deployment guides
          - Performance tips

          ## Community

          - **Discord** - [Join our community](https://discord.gg/GSh2Ak3b8Q)
          - **GitHub** - [rari-build/rari](https://github.com/rari-build/rari)
          - **Documentation** - [rari.build/docs](https://rari.build/docs)

          ## Troubleshooting

          ### Installation Issues

          If you encounter issues during installation:

          1. Ensure you're using Node.js 22 or higher: `node --version`
          2. Clear npm cache: `npm cache clean --force`
          3. Try with a different package manager (pnpm, yarn, or bun)

          ### Platform-Specific Binaries

          rari automatically downloads the correct binary for your platform. Supported platforms:

          - macOS (Intel and Apple Silicon)
          - Linux (x64 and ARM64)
          - Windows (x64 and ARM64)

          If the binary download fails, check your internet connection and firewall settings.

          ## Contributing

          We welcome contributions! See our [Contributing Guide](https://github.com/rari-build/rari/blob/main/.github/CONTRIBUTING.md) for details.

          ## License

          MIT License - see [LICENSE](https://github.com/rari-build/rari/blob/main/LICENSE) for details.
          EOF
          fi

      - name: Publish to npm
        run: |
          cd "packages/${{ steps.pkg.outputs.name }}"

          IS_PRERELEASE=$(node -e "
            const v = '${{ steps.pkg.outputs.version }}';
            process.stdout.write(v.includes('-') ? 'true' : 'false');
          ")

          if [[ "${IS_PRERELEASE}" == "true" ]]; then
            echo "Publishing with tag 'next'..."
            npm publish --access public --tag next
          else
            echo "Publishing with tag 'latest'..."
            npm publish --access public
          fi
