name: Release

on:
  push:
    tags:
      - 'v*'
      - 'rari@*'
      - 'create-rari-app@*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/v')  || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: namespace-profile-rari-linux-amd64
            name: rari-linux-x64
          - target: aarch64-unknown-linux-gnu
            os: namespace-profile-rari-linux-arm64
            name: rari-linux-arm64
          - target: x86_64-apple-darwin
            os: namespace-profile-rari-macos-arm64
            name: rari-darwin-x64
          - target: aarch64-apple-darwin
            os: namespace-profile-rari-macos-arm64
            name: rari-darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: rari-win32-x64.exe
            vcpkg_triplet: x64-windows
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
            name: rari-win32-arm64.exe
            vcpkg_triplet: arm64-windows

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: nightly
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libfontconfig1-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew list pkg-config &>/dev/null || brew install pkg-config
          brew list fontconfig &>/dev/null || brew install fontconfig

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install fontconfig:${{ matrix.vcpkg_triplet }}
        shell: pwsh

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cargo/registry/cache
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cargo/registry/index
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache cargo build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-build-

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p crates/rari/snapshots
          touch crates/rari/snapshots/RARI_SNAPSHOT.bin
          echo 'pub static RESIDUAL_LAZY_ESM_SOURCES: &[(&str, &str)] = &[];' > crates/rari/snapshots/residual_lazy_sources.rs
          echo 'pub static RESIDUAL_LAZY_JS_SOURCES: &[(&str, &str)] = &[];' >> crates/rari/snapshots/residual_lazy_sources.rs
          cargo run --release --manifest-path tools/snapshot/Cargo.toml -- crates/rari/snapshots
          cargo build --release --target ${{ matrix.target }} --bin rari
        env:
          AWS_LC_SYS_PREBUILT_NASM: 1
          PKG_CONFIG_PATH: C:\vcpkg\installed\${{ matrix.vcpkg_triplet }}\lib\pkgconfig
          VCPKG_ROOT: C:\vcpkg

      - name: Build binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p crates/rari/snapshots
          touch crates/rari/snapshots/RARI_SNAPSHOT.bin
          echo 'pub static RESIDUAL_LAZY_ESM_SOURCES: &[(&str, &str)] = &[];' > crates/rari/snapshots/residual_lazy_sources.rs
          echo 'pub static RESIDUAL_LAZY_JS_SOURCES: &[(&str, &str)] = &[];' >> crates/rari/snapshots/residual_lazy_sources.rs
          cargo run --release --manifest-path tools/snapshot/Cargo.toml -- crates/rari/snapshots
          cargo build --release --target ${{ matrix.target }} --bin rari

      - name: Prepare binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p binaries
          cp target/${{ matrix.target }}/release/rari binaries/${{ matrix.name }}
          chmod +x binaries/${{ matrix.name }}

      - name: Prepare binary (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir binaries
          copy target\${{ matrix.target }}\release\rari.exe binaries\${{ matrix.name }}

      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.name }}
          path: binaries/${{ matrix.name }}

  npm-release-platform:
    needs: build-binaries
    runs-on: namespace-profile-rari-linux-amd64
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write

    strategy:
      matrix:
        include:
          - platform: linux-x64
            binary: rari-linux-x64
          - platform: linux-arm64
            binary: rari-linux-arm64
          - platform: darwin-x64
            binary: rari-darwin-x64
          - platform: darwin-arm64
            binary: rari-darwin-arm64
          - platform: win32-x64
            binary: rari-win32-x64.exe
          - platform: win32-arm64
            binary: rari-win32-arm64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.14.0
          package-manager-cache: false

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Download platform binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ matrix.binary }}
          path: platform-binary

      - name: Prepare platform package
        run: |
          PACKAGE_NAME="rari-${{ matrix.platform }}"
          PACKAGE_DIR="packages/${PACKAGE_NAME}"

          mkdir -p "${PACKAGE_DIR}/bin"

          BINARY_FILE=$(find platform-binary -name "*rari*" -type f | head -1)

          if [[ "${{ matrix.platform }}" == win32-* ]]; then
            cp "${BINARY_FILE}" "${PACKAGE_DIR}/bin/rari.exe"
            chmod +x "${PACKAGE_DIR}/bin/rari.exe"
          else
            cp "${BINARY_FILE}" "${PACKAGE_DIR}/bin/rari"
            chmod +x "${PACKAGE_DIR}/bin/rari"
          fi

          ls -la "${PACKAGE_DIR}/bin/"

      - name: Generate package.json
        run: |
          PACKAGE_NAME="rari-${{ matrix.platform }}"
          PACKAGE_DIR="packages/${PACKAGE_NAME}"
          VERSION="${GITHUB_REF#refs/tags/v}"

          case "${{ matrix.platform }}" in
            darwin-arm64)
              OS="darwin"
              CPU="arm64"
              DESCRIPTION="macOS ARM64 binary"
              KEYWORDS='"darwin", "arm64", "macos", "apple-silicon",'
              BIN_PATH="./bin/rari"
              BIN_FILE="bin/rari"
              ;;
            darwin-x64)
              OS="darwin"
              CPU="x64"
              DESCRIPTION="macOS x64 binary"
              KEYWORDS='"darwin", "x64", "macos", "intel",'
              BIN_PATH="./bin/rari"
              BIN_FILE="bin/rari"
              ;;
            linux-arm64)
              OS="linux"
              CPU="arm64"
              DESCRIPTION="Linux ARM64 binary"
              KEYWORDS='"linux", "arm64",'
              BIN_PATH="./bin/rari"
              BIN_FILE="bin/rari"
              ;;
            linux-x64)
              OS="linux"
              CPU="x64"
              DESCRIPTION="Linux x64 binary"
              KEYWORDS='"linux", "x64",'
              BIN_PATH="./bin/rari"
              BIN_FILE="bin/rari"
              ;;
            win32-x64)
              OS="win32"
              CPU="x64"
              DESCRIPTION="Windows x64 binary"
              KEYWORDS='"win32", "windows", "x64",'
              BIN_PATH="./bin/rari.exe"
              BIN_FILE="bin/rari.exe"
              ;;
            win32-arm64)
              OS="win32"
              CPU="arm64"
              DESCRIPTION="Windows ARM64 binary"
              KEYWORDS='"win32", "windows", "arm64",'
              BIN_PATH="./bin/rari.exe"
              BIN_FILE="bin/rari.exe"
              ;;
          esac

          cp .github/templates/package.json.platform "${PACKAGE_DIR}/package.json"
          sed -i "s|{NAME}|${PACKAGE_NAME}|g" "${PACKAGE_DIR}/package.json"
          sed -i "s|{VERSION}|${VERSION}|g" "${PACKAGE_DIR}/package.json"
          sed -i "s|{DESCRIPTION}|${DESCRIPTION}|g" "${PACKAGE_DIR}/package.json"
          sed -i "s|{OS}|${OS}|g" "${PACKAGE_DIR}/package.json"
          sed -i "s|{CPU}|${CPU}|g" "${PACKAGE_DIR}/package.json"
          sed -i "s|{KEYWORDS}|${KEYWORDS}|g" "${PACKAGE_DIR}/package.json"
          sed -i "s|{BIN_PATH}|${BIN_PATH}|g" "${PACKAGE_DIR}/package.json"
          sed -i "s|{BIN_FILE}|${BIN_FILE}|g" "${PACKAGE_DIR}/package.json"

          node --input-type=module -e "import { readFileSync, writeFileSync } from 'fs'; const f = '${PACKAGE_DIR}/package.json'; writeFileSync(f, JSON.stringify(JSON.parse(readFileSync(f, 'utf8')), null, 2) + '\n');"

          echo "✓ Generated package.json for ${PACKAGE_NAME}@${VERSION}"

      - name: Copy LICENSE
        run: |
          PACKAGE_NAME="rari-${{ matrix.platform }}"
          PACKAGE_DIR="packages/${PACKAGE_NAME}"

          cp LICENSE "${PACKAGE_DIR}/LICENSE"
          echo "✓ Copied LICENSE to ${PACKAGE_NAME}"

      - name: Generate README
        run: |
          PACKAGE_NAME="rari-${{ matrix.platform }}"
          PACKAGE_DIR="packages/${PACKAGE_NAME}"

          # Set platform-specific info
          case "${{ matrix.platform }}" in
            darwin-arm64)
              PLATFORM_NAME="macOS ARM64 (Apple Silicon)"
              OS_NAME="macOS"
              ARCH="ARM64"
              DESCRIPTION="Apple Silicon Macs (M1, M2, M3, M4)"
              ;;
            darwin-x64)
              PLATFORM_NAME="macOS x64 (Intel)"
              OS_NAME="macOS"
              ARCH="x64"
              DESCRIPTION="Intel-based Macs"
              ;;
            linux-arm64)
              PLATFORM_NAME="Linux ARM64"
              OS_NAME="Linux"
              ARCH="ARM64"
              DESCRIPTION="ARM64/aarch64 Linux systems"
              ;;
            linux-x64)
              PLATFORM_NAME="Linux x64"
              OS_NAME="Linux"
              ARCH="x64"
              DESCRIPTION="x86_64 Linux systems"
              ;;
            win32-x64)
              PLATFORM_NAME="Windows x64"
              OS_NAME="Windows"
              ARCH="x64"
              DESCRIPTION="x86_64 Windows systems"
              ;;
            win32-arm64)
              PLATFORM_NAME="Windows ARM64"
              OS_NAME="Windows"
              ARCH="ARM64"
              DESCRIPTION="ARM64 Windows systems"
              ;;
          esac

          cp .github/templates/README.platform.md "${PACKAGE_DIR}/README.md"
          sed -i "s|\${PACKAGE_NAME}|${PACKAGE_NAME}|g" "${PACKAGE_DIR}/README.md"
          sed -i "s|\${PLATFORM_NAME}|${PLATFORM_NAME}|g" "${PACKAGE_DIR}/README.md"
          sed -i "s|\${OS_NAME}|${OS_NAME}|g" "${PACKAGE_DIR}/README.md"
          sed -i "s|\${ARCH}|${ARCH}|g" "${PACKAGE_DIR}/README.md"
          sed -i "s|\${DESCRIPTION}|${DESCRIPTION}|g" "${PACKAGE_DIR}/README.md"

          echo "Generated README for ${PACKAGE_NAME}"

      - name: Publish platform package
        run: |
          PACKAGE_NAME="rari-${{ matrix.platform }}"
          cd "packages/${PACKAGE_NAME}"
          npm pkg fix
          echo "Publishing ${PACKAGE_NAME}..."
          npm publish --access public
          echo "Successfully published ${PACKAGE_NAME}"

  npm-release-package:
    runs-on: namespace-profile-rari-linux-amd64
    if: startsWith(github.ref, 'refs/tags/rari@') || startsWith(github.ref, 'refs/tags/create-rari-app@')
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Determine package info
        id: pkg
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PACKAGE_NAME="${TAG%%@*}"
          VERSION="${TAG#*@}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "📦 Publishing ${PACKAGE_NAME}@${VERSION}"

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.14.0
          package-manager-cache: false

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          npm_config_trust_lockfile: 'true'

      - name: Build package
        run: pnpm --filter "${{ steps.pkg.outputs.name }}..." build

      - name: Generate README and LICENSE
        run: |
          PACKAGE_DIR="packages/${{ steps.pkg.outputs.name }}"
          cp LICENSE "${PACKAGE_DIR}/LICENSE"

          if [[ "${{ steps.pkg.outputs.name }}" == "rari" ]]; then
            cp .github/templates/README.rari.md "${PACKAGE_DIR}/README.md"
          fi

          if [[ "${{ steps.pkg.outputs.name }}" == "create-rari-app" ]]; then
            cp .github/templates/README.create-rari-app.md "${PACKAGE_DIR}/README.md"
          fi

      - name: Publish to npm
        run: |
          cd "packages/${{ steps.pkg.outputs.name }}"

          IS_PRERELEASE=$(node -e "
            const v = '${{ steps.pkg.outputs.version }}';
            process.stdout.write(v.includes('-') ? 'true' : 'false');
          ")

          # pnpm pack resolves catalog: and workspace: protocols
          TARBALL=$(pnpm pack | tail -1)
          echo "Packed: ${TARBALL}"

          if [[ "${IS_PRERELEASE}" == "true" ]]; then
            echo "Publishing with tag 'next'..."
            npm publish "${TARBALL}" --access public --tag next
          else
            echo "Publishing with tag 'latest'..."
            npm publish "${TARBALL}" --access public
          fi
