name: Setup Windows cache
description: GitHub Actions cache fallbacks for Windows runners without Namespace cache volumes

inputs:
  rust:
    description: Enable Swatinem/rust-cache restore on Windows
    required: false
    default: 'false'
  rust-shared-key:
    description: shared-key passed to Swatinem/rust-cache
    required: false
    default: rust-Windows
  rust-workspaces:
    description: Optional workspaces filter for Swatinem/rust-cache
    required: false
    default: ''
  pnpm:
    description: Enable pnpm store caching via actions/setup-node
    required: false
    default: 'false'
  playwright:
    description: Enable Playwright browser caching via actions/cache
    required: false
    default: 'false'
  node-version:
    description: Node.js version for pnpm cache setup
    required: false
    default: 22.18.0

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      if: inputs.pnpm == 'true'

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      if: inputs.pnpm == 'true'
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm

    - name: Cache Rust
      if: inputs.rust == 'true' && inputs.rust-workspaces == ''
      uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        shared-key: ${{ inputs.rust-shared-key }}
        save-if: 'false'

    - name: Cache Rust (scoped workspace)
      if: inputs.rust == 'true' && inputs.rust-workspaces != ''
      uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        shared-key: ${{ inputs.rust-shared-key }}
        workspaces: ${{ inputs.rust-workspaces }}
        save-if: 'false'

    - name: Cache Playwright browsers
      if: inputs.playwright == 'true'
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~\AppData\Local\ms-playwright
        key: playwright-win-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: playwright-win-
