name: Restore use-cache addon
description: Restore the use-cache native addon from a Namespace workflow artifact

inputs:
  platform:
    description: Platform package suffix (linux-x64 or win32-x64)
    required: true

runs:
  using: composite
  steps:
    - name: Download use-cache addon
      uses: namespace-actions/download-artifact@7cbad919e4b0e09f17e9d6311a444ff002992b5b # v2.0.1
      with:
        name: use-cache-${{ inputs.platform }}
        path: packages/use-cache-${{ inputs.platform }}
