name: Restore use-cache addon
description: Restore the use-cache native addon from GHA cache or artifact

inputs:
  platform:
    description: Platform package suffix (linux-x64 or win32-x64)
    required: true

outputs:
  cache-hit:
    description: Whether the addon was restored from GHA cache
    value: ${{ steps.cache-restore.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - name: Restore use-cache addon from cache
      id: cache-restore
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: packages/use-cache-${{ inputs.platform }}
        key: use-cache-${{ inputs.platform }}-${{ hashFiles('crates/rari_use_cache/**', 'Cargo.lock') }}
        restore-keys: |
          use-cache-${{ inputs.platform }}-

    - name: Download use-cache addon
      if: steps.cache-restore.outputs.cache-hit != 'true'
      continue-on-error: true
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: use-cache-${{ inputs.platform }}
        path: packages/use-cache-${{ inputs.platform }}
