name: Setup Namespace cache
description: Configure Namespace cache volumes for dependencies and build outputs

inputs:
  cache:
    description: Newline-separated cache modes passed to nscloud-cache-action
    required: true
  node-version:
    description: Node.js version used when enabling pnpm cache planning
    required: false
    default: 22.18.0

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      if: contains(inputs.cache, 'pnpm')

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      if: contains(inputs.cache, 'pnpm')
      with:
        node-version: ${{ inputs.node-version }}
        package-manager-cache: false

    - name: Configure Namespace cache
      uses: namespacelabs/nscloud-cache-action@58bf6e08898e88803c098e2b522668541cd3b2e3 # v1.6.0
      with:
        cache: ${{ inputs.cache }}
