name: Setup pnpm
description: Install pnpm, Node.js, and optionally project dependencies

inputs:
  node-version:
    description: Node.js version passed to actions/setup-node
    required: false
    default: 22.18.0
  install:
    description: Run pnpm install --frozen-lockfile after setup
    required: false
    default: 'true'
  setup-toolchain:
    description: Run pnpm/action-setup and actions/setup-node (skip when a cache action already did)
    required: false
    default: 'true'
  cache:
    description: Enable pnpm cache in actions/setup-node (disable when using setup-namespace-cache or setup-windows-cache)
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      if: inputs.setup-toolchain == 'true'

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      if: inputs.setup-toolchain == 'true'
      with:
        node-version: ${{ inputs.node-version }}
        cache: ${{ inputs.cache == 'true' && 'pnpm' || '' }}

    - name: Install dependencies
      if: inputs.install == 'true'
      shell: bash
      run: pnpm install --frozen-lockfile
