name: Setup pnpm
description: Install pnpm, Node.js, and optionally project dependencies

inputs:
  node-version:
    description: Node.js version passed to actions/setup-node
    required: false
    default: lts/*
  install:
    description: Run pnpm install --frozen-lockfile after setup
    required: false
    default: 'true'
  cache:
    description: Enable pnpm cache in actions/setup-node
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      if: inputs.cache == 'true'
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      if: inputs.cache != 'true'
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install dependencies
      if: inputs.install == 'true'
      shell: bash
      run: pnpm install --frozen-lockfile
