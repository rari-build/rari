name: Checkout
description: Check out the repository using Namespace git mirror caching

inputs:
  fetch-depth:
    description: Number of commits to fetch (0 = full history)
    required: false
    default: '1'
  ref:
    description: Branch, tag, or SHA to check out
    required: false
    default: ''
  path:
    description: Relative path under $GITHUB_WORKSPACE for the repository
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Check out repository
      uses: namespacelabs/nscloud-checkout-action@445c25d7009680597d73eb03c4e1cd5be522ed73 # v9.0.0
      with:
        fetch-depth: ${{ inputs.fetch-depth }}
        ref: ${{ inputs.ref }}
        path: ${{ inputs.path }}
