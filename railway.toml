[build]
builder = "RAILPACK"
buildCommand = "pnpm --filter @rari/web build"
watchPatterns = [
  "web/**",
  "packages/rari/**",
  "pnpm-workspace.yaml",
  "railway.toml",
  "railpack.json",
]

[deploy]
startCommand = "cd web && pnpm start"
healthcheckPath = "/_rari/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
