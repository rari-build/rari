[build]
builder = "RAILPACK"
buildCommand = "pnpm --filter @rari/web build"

[deploy]
startCommand = "ls -la /tmp && ls -la /dev/urandom && cd web && RUST_BACKTRACE=full pnpm start"
healthcheckPath = "/_rari/health"
healthcheckTimeout = 600
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
