[package]
name = "rari"
version = "0.14.8"
authors = { workspace = true }
edition = { workspace = true }
license = { workspace = true }
repository = { workspace = true }
description = "rari: Runtime Accelerated Rendering Infrastructure - A high-performance React Server Components framework powered by Rust"
keywords = [
  "react",
  "server-components",
  "rsc",
  "ssr",
  "framework"
]
categories = [
  "web-programming",
  "web-programming::http-server"
]
readme = "../../README.md"
homepage = "https://github.com/rari-build/rari"
documentation = "https://github.com/rari-build/rari/tree/main/web"

[package.metadata.cargo-machete]
ignored = [
  "num-bigint-dig",
  "windows-sys"
]

[lib]
crate-type = [ "rlib" ]
doctest = false

[[bin]]
name = "rari"
path = "src/bin/rari.rs"

[dependencies]
# === Core Runtime Dependencies ===
deno_core = { workspace = true }
deno_error = { workspace = true }
deno_features = "0.47.0"
deno_bundle_runtime = "0.37.0"
deno_runtime = "0.258.0"
deno_permissions = "0.109.0"
deno_process = "0.65.0"

# === Essential Web APIs ===
deno_cache = "0.183.0"
deno_crypto = "0.264.0"
deno_fetch = "0.274.0"
deno_web = "0.281.0"
deno_webidl = "0.250.0"
deno_webstorage = "0.245.0"

# === Network & HTTP ===
deno_http = "0.248.0"
deno_net = "0.242.0"
deno_tls = "0.237.0"
deno_websocket = "0.255.0"

# === File System & I/O ===
deno_fs = "0.160.0"
deno_io = "0.160.0"

# === Advanced Features ===
deno_telemetry = "0.72.0"
deno_terminal = "=0.2.3"
deno_webgpu = "0.217.0"
deno_kv = "0.158.0"
deno_cron = "0.130.0"

# === Node.js Integration ===
deno_node = "0.188.0"
deno_node_crypto = "0.20.0"
deno_node_sqlite = "0.20.0"
deno_resolver = "0.81.0"
node_resolver = "0.88.0"
num-bigint-dig = "=0.8.2"

# === FFI & NAPI ===
deno_ffi = "0.237.0"
deno_napi = "0.181.0"

# === Async & Concurrency ===
async-stream = "0.3.6"
async-trait = "0.1.89"
futures = "0.3.32"
futures-util = "0.3.32"
tokio = { version = "1.52.3", features = [
  "rt-multi-thread",
  "macros",
  "sync",
  "time",
  "fs",
  "net",
  "io-util",
] }
async-compression = { version = "0.4.42", features = [
  "tokio",
  "zstd",
  "brotli",
  "gzip",
] }

# === Serialization ===
serde = { workspace = true }
serde_json = { workspace = true }
base64 = "0.22.1"
rkyv = "0.8.16"

# === HTTP Client & Server ===
http = "1.4.1"
reqwest = { version = "0.13.4", default-features = false, features = [
  "stream",
  "rustls",
  "blocking",
] }
axum = { version = "0.8.9", features = [
  "ws",
  "macros"
] }
tower = { version = "0.5.3", default-features = false, features = [ "util" ] }
tower-http = { version = "0.6.11", features = [
  "fs",
  "compression-full"
] }
colored = { workspace = true }
url = { workspace = true }
urlencoding = "2.1.3"
tokio-tungstenite = "0.29.0"
tungstenite = "0.29.0"

# === Utilities ===
bytes = "1.11.1"
cow-utils = { workspace = true }
dashmap = "6.2.1"
parking_lot = "0.12.5"
smallvec = "1.15.1"
regex = { workspace = true }
rustc-hash = { workspace = true }
lru = "0.18.0"
uuid = { version = "1.23.2", features = [ "v4" ] }
thiserror = "2.0.18"

# === Image Processing & Layout ===
image = { version = "0.25.10", default-features = false, features = [
  "jpeg",
  "png",
  "gif",
  "webp",
  "avif"
] }
webp = "0.3.1"

# Layout and text rendering
taffy = "0.10.1"
parley = "0.10.0"
swash = "0.2.7"
zeno = "0.3.3"
wuff = "0.2.5"
resvg = "0.47.0"

# === System Integration ===
hyper-util = { version = "0.1.20", features = [
  "tokio",
  "client-legacy",
] }
libc = "0.2.182"
nix = { version = "=0.30.1", features = [ "term" ] }
sys_traits = "=0.1.28"

# === Development Tools ===
rustyline = "=17.0.0"
deno_ast = { workspace = true }
deno_package_json = { version = "0.52.0", default-features = false }
deno_semver = "=0.10.0"

# === Platform-specific Dependencies ===
windows-sys = { version = "=0.59.0", features = [
  "Win32_Foundation",
  "Win32_Storage_FileSystem",
  "Win32_System_Console",
  "Win32_UI_Input_KeyboardAndMouse",
] }

# === CLI & Logging ===
clap = { workspace = true }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = [ "env-filter" ] }

# === TLS & Crypto ===
rustls = { version = "=0.23.40", default-features = false, features = [
  "std",
  "aws_lc_rs",
] }
sha2 = "0.11.0"
hex = "0.4.3"

[dev-dependencies]
tracing-test = "0.2.6"
tempfile = "3.27.0"
