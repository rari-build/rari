[package]
name = "rari"
version = "0.14.12"
edition = { workspace = true }
authors = { workspace = true }
license = { workspace = true }
description = { workspace = true }
homepage = { workspace = true }
repository = { workspace = true }
documentation = { workspace = true }
readme = { workspace = true }
keywords = { workspace = true }
categories = { workspace = true }

[lib]
crate-type = [ "rlib" ]

[dependencies]
# === Core Runtime Dependencies ===
deno_core = { workspace = true }
deno_error = { workspace = true }
deno_features = "0.50.0"
deno_bundle_runtime = "0.40.0"
deno_runtime = "0.261.0"
deno_permissions = "0.112.0"
deno_process = "0.68.0"

# === Essential Web APIs ===
deno_cache = "0.186.0"
deno_crypto = "0.267.0"
deno_fetch = "0.277.0"
deno_web = "0.284.0"
deno_webidl = "0.253.0"
deno_webstorage = "0.248.0"

# === Network & HTTP ===
deno_http = "0.251.0"
deno_net = "0.245.0"
deno_tls = "0.240.0"
deno_websocket = "0.258.0"

# === File System & I/O ===
deno_fs = "0.163.0"
deno_io = "0.163.0"

# === Advanced Features ===
deno_telemetry = "0.75.0"
deno_webgpu = "0.220.0"
deno_kv = "0.161.0"
deno_cron = "0.133.0"

# === Node.js Integration ===
deno_node = { workspace = true }
deno_node_crypto = "0.23.0"
deno_node_sqlite = "0.23.0"
deno_resolver = "0.84.0"
node_resolver = "0.91.0"

# === FFI & NAPI ===
deno_ffi = "0.240.0"
deno_napi = "0.184.0"

# === Error Handling ===
rari-error = { workspace = true }
thiserror = { workspace = true }

# === Async & Concurrency ===
async-stream = "0.3.6"
async-trait = "0.1.89"
futures = "0.3.32"
futures-util = "0.3.32"
tokio = { version = "1.52.3", features = [
  "rt-multi-thread",
  "macros",
  "sync",
  "time",
  "fs",
  "net",
  "io-util",
] }
async-compression = { version = "0.4.42", features = [
  "tokio",
  "zstd",
  "brotli",
  "gzip",
] }

# === Serialization ===
rari-rsc = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
base64 = { workspace = true }
rkyv = "0.8.16"

# === HTTP Client & Server ===
http = "1.4.2"
reqwest = { version = "0.13.4", default-features = false, features = [
  "stream",
  "rustls",
  "blocking",
] }
axum = { version = "0.8.9", features = [
  "ws",
  "macros"
] }
tower = { version = "0.5.3", default-features = false, features = [ "util" ] }
tower-http = { version = "0.7.0", features = [
  "fs",
  "compression-full"
] }
colored = { workspace = true }
url = { workspace = true }
urlencoding = "2.1.3"
tokio-tungstenite = "0.29.0"
tungstenite = "0.29.0"

# === Utilities ===
rari-utils = { workspace = true }
bytes = { version = "1.12.0", features = [ "serde" ] }
cow-utils = { workspace = true }
dashmap = "6.2.1"
parking_lot = { workspace = true }
smallvec = { workspace = true }
regex = { workspace = true }
rustc-hash = { workspace = true }
lru = "0.18.0"
uuid = { version = "1.23.4", features = [ "v4" ] }
redis = { version = "1.3.0", default-features = false, features = [ "tokio-comp" ] }

# === Image Processing & Layout ===
image = { version = "0.25.10", default-features = false, features = [
  "jpeg",
  "png",
  "gif",
  "webp",
  "avif"
] }
webp = "0.3.1"

# Layout and text rendering
taffy = "0.11.0"
parley = "0.11.0"
swash = "0.2.9"
zeno = "0.3.3"
wuff = "0.2.5"
resvg = "0.47.0"

# === System Integration ===
hyper-util = { version = "0.1.20", features = [
  "tokio",
  "client-legacy"
] }
libc = "0.2.182"
nix = { version = "=0.30.1", features = [ "term" ] }
sys_traits = "=0.1.28"

# === Development Tools ===
rustyline = "=17.0.0"
deno_ast = { workspace = true }
deno_package_json = { version = "0.55.0", default-features = false }
deno_semver = "=0.10.0"

# === Platform-specific Dependencies ===
windows-sys = { version = "=0.59.0", features = [
  "Win32_Foundation",
  "Win32_Storage_FileSystem",
  "Win32_System_Console",
  "Win32_UI_Input_KeyboardAndMouse",
] }

# === CLI & Logging ===
clap = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { version = "0.3.23", features = [ "env-filter" ] }

# === TLS & Crypto ===
rustls = { version = "=0.23.40", default-features = false, features = [
  "std",
  "aws_lc_rs",
] }
sha2 = { workspace = true }
hex = { workspace = true }

[lints]
workspace = true
