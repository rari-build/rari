  - typescript@7.0.2
  - '@voidzero-dev/vite-plus-core@0.2.4'
  - '@voidzero-dev/vite-plus-darwin-arm64@0.2.4'
  - '@voidzero-dev/vite-plus-darwin-x64@0.2.4'
