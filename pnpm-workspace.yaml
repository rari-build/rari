catalogMode: prefer
minimumReleaseAgeExclude:
  - rari-darwin-arm64@0.14.3
  - rari-darwin-x64@0.14.3
  - rari-linux-arm64@0.14.3
  - rari-linux-x64@0.14.3
  - rari-win32-arm64@0.14.3
  - rari-win32-x64@0.14.3
  - rari@0.14.3
shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - semver@6.3.1
packages:
  - examples/*
  - packages/*
  - '!packages/rari-darwin-x64'
  - '!packages/rari-linux-arm64'
  - '!packages/rari-linux-x64'
  - '!packages/rari-win32-arm64'
  - '!packages/rari-win32-x64'
  - test/fixtures/*
  - web
catalogs:
  analytics:
    posthog-js: ^1.378.0
  build:
    rolldown: ^1.0.3
    vite: ^8.0.16
    vite-plus: ^0.1.24
  cli:
    '@clack/prompts': ^1.5.0
  default:
    rari: ^0.14.3
  eslint:
    '@antfu/eslint-config': ^9.0.0
    '@eslint-react/eslint-plugin': ^5.8.9
    '@typescript-eslint/utils': ^8.60.1
    eslint: ^10.4.1
    eslint-plugin-de-morgan: ^2.1.2
    eslint-plugin-oxlint: ^1.68.0
    eslint-plugin-react-refresh: ^0.5.2
    knip: ^6.15.0
  mdx:
    '@mdx-js/mdx': ^3.1.1
    '@shikijs/core': ^3.23.0
    '@shikijs/engine-oniguruma': ^3.23.0
    '@shikijs/langs': ^3.23.0
    '@shikijs/themes': ^3.23.0
    '@shikijs/types': ^3.23.0
    mermaid: ^11.15.0
    remark-gfm: ^4.0.1
  monitoring:
    '@sentry/react': ^10.55.0
  react:
    '@types/react': ^19.2.16
    '@types/react-dom': ^19.2.3
    react: ^19.2.7
    react-dom: ^19.2.7
  tailwind:
    '@tailwindcss/vite': ^4.3.0
    tailwindcss: ^4.3.0
  testing:
    '@playwright/test': ^1.60.0
    '@vitest/coverage-v8': ^4.1.8
  typescript:
    '@types/node': ^25.9.1
    '@typescript/native-preview': ^7.0.0-dev.20260601.1
onlyBuiltDependencies:
  - esbuild
  - oxlint
  - '@shikijs/engine-oniguruma'
allowBuilds:
  core-js: true
  protobufjs: true
