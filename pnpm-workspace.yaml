  - '@voidzero-dev/vite-plus-linux-arm64-musl@0.2.4'
  - '@voidzero-dev/vite-plus-linux-x64-gnu@0.2.4'
  - '@voidzero-dev/vite-plus-linux-x64-musl@0.2.4'
  - '@voidzero-dev/vite-plus-win32-arm64-msvc@0.2.4'
  - '@voidzero-dev/vite-plus-win32-x64-msvc@0.2.4'
  - vite-plus@0.2.4
shellEmulator: true
trustPolicy: no-downgrade
packages:
  - examples/*
  - packages/*
  - test/fixtures/*
  - tools/bundle-react-esm
  - web
catalogs:
  analytics:
    posthog-js: ^1.398.2
  build:
    '@napi-rs/cli': ^3.7.2
    lightningcss: ^1.32.0
    rolldown: ^1.1.4
    vite: ^8.1.3
    vite-plus: ^0.2.4
  cli:
    '@clack/prompts': ^1.7.0
  # default:
  # rari: ^0.14.12
  eslint:
    '@antfu/eslint-config': ^9.1.0
    '@eslint-react/eslint-plugin': ^5.11.3
    eslint: ^10.6.0
    eslint-plugin-de-morgan: ^2.1.2
    eslint-plugin-oxlint: ^1.73.0
    eslint-plugin-react-refresh: ^0.5.3
    knip: ^6.25.0
  mdx:
    '@mdx-js/mdx': ^3.1.1
    '@shikijs/core': ^4.3.1
    '@shikijs/engine-oniguruma': ^4.3.1
    '@shikijs/langs': ^4.3.1
    '@shikijs/themes': ^4.3.1
    '@shikijs/types': ^4.3.1
    mermaid: ^11.16.0
    remark-gfm: ^4.0.1
  monitoring:
    '@sentry/react': ^10.64.0
  react:
    '@types/react': ^19.2.17
    '@types/react-dom': ^19.2.3
    react: ^19.2.7
    react-dom: ^19.2.7
    react-server-dom-webpack: ^19.2.7
  tailwind:
    '@tailwindcss/vite': ^4.3.2
    tailwindcss: ^4.3.2
  testing:
    '@playwright/test': ^1.61.1
    '@vitest/coverage-v8': ^4.1.10
  typescript:
    '@types/node': ^26.1.0
    # https://devblogs.microsoft.com/typescript/announcing-typescript-7-0/#running-side-by-side-with-typescript-6.0
    typescript: npm:@typescript/typescript6@^6.0.2
    typescript-7: npm:typescript@^7.0.2
allowBuilds:
  core-js: true
