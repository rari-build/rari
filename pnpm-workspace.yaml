catalogMode: prefer
minimumReleaseAgeExclude:
  - rari-darwin-arm64@0.14.0
  - rari-darwin-x64@0.14.0
  - rari-linux-arm64@0.14.0
  - rari-linux-x64@0.14.0
  - rari-win32-arm64@0.14.0
  - rari-win32-x64@0.14.0
  - rari@0.14.0
shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - semver@6.3.1
packages:
  - examples/*
  - packages/*
  - '!packages/rari-darwin-x64'
  - '!packages/rari-linux-arm64'
  - '!packages/rari-linux-x64'
  - '!packages/rari-win32-arm64'
  - '!packages/rari-win32-x64'
  - test/fixtures/*
  - web
catalogs:
  analytics:
    '@posthog/react': ^1.9.1
    posthog-js: ^1.376.0
  build:
    rolldown: ^1.0.2
    vite: ^8.0.14
    vite-plus: ^0.1.22
  cli:
    '@clack/prompts': ^1.4.0
  default:
    rari: ^0.14.0
  eslint:
    '@antfu/eslint-config': ^9.0.0
    '@eslint-react/eslint-plugin': ^5.8.5
    '@typescript-eslint/utils': ^8.59.4
    eslint: ^10.4.0
    eslint-plugin-de-morgan: ^2.1.2
    eslint-plugin-oxlint: ^1.66.0
    eslint-plugin-react-refresh: ^0.5.2
    knip: ^6.14.2
  mdx:
    '@mdx-js/mdx': ^3.1.1
    '@shikijs/core': ^3.23.0
    '@shikijs/engine-oniguruma': ^3.23.0
    '@shikijs/langs': ^3.23.0
    '@shikijs/themes': ^3.23.0
    '@shikijs/types': ^3.23.0
    remark-gfm: ^4.0.1
  monitoring:
    '@sentry/react': ^10.53.1
  react:
    '@types/react': ^19.2.15
    '@types/react-dom': ^19.2.3
    react: ^19.2.6
    react-dom: ^19.2.6
  tailwind:
    '@tailwindcss/vite': ^4.3.0
    tailwindcss: ^4.3.0
  testing:
    '@playwright/test': ^1.60.0
    '@vitest/coverage-v8': ^4.1.7
  typescript:
    '@types/node': ^25.9.1
    '@typescript/native-preview': ^7.0.0-dev.20260525.1
onlyBuiltDependencies:
  - esbuild
  - oxlint
  - '@shikijs/engine-oniguruma'
allowBuilds:
  core-js: true
  protobufjs: true
