  { path = "str::to_lowercase", reason = "To avoid unecessary allocation, use `cow_utils::CowUtils::cow_to_lowercase` instead." },
  { path = "str::to_uppercase", reason = "To avoid unecessary allocation, use `cow_utils::CowUtils::cow_to_uppercase` instead." },
  { path = "str::replace", reason = "To avoid unecessary allocation, use `cow_utils::CowUtils::cow_replace` instead." },
  { path = "str::replacen", reason = "To avoid unecessary allocation, use `cow_utils::CowUtils::cow_replacen` instead." },
]
