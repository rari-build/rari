  { path = "std::collections::HashSet", reason = "Use `rustc_hash::FxHashSet` instead, which is typically faster for most use cases." },
  { path = "std::collections::BTreeMap", reason = "Use `rustc_hash::FxHashMap` instead, which is typically faster for most use cases." },
]
